# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  vmImage: 'ubuntu-latest'
strategy:
  matrix:
    Python310:
      python.version: '3.10'

steps:
- checkout: self
  persistCredentials: true

- task: UsePythonVersion@0
  inputs:
    versionSpec: '$(python.version)'
  displayName: 'Use Python $(python.version)'

- script: |
    echo "Cleaning disk space..."
    sudo apt-get clean
    sudo rm -rf /var/lib/apt/lists/*
    sudo pip cache purge
    sudo rm -rf /tmp/*
    sudo rm -rf ~/.cache/pip/*
    sudo df -h  # 查看剩余空间
  displayName: 'Clean Disk Space Before Install'

- script: |
    python -m pip install --upgrade pip
    python -m pip install --no-cache-dir pillow
    python -m pip install --no-cache-dir torch==2.4.1+cpu torchvision==0.19.1+cpu torchaudio==2.4.1 --extra-index-url https://download.pytorch.org/whl/cpu
    python -m pip install --no-cache-dir .
  displayName: 'Install Package'

- task: CmdLine@2
  inputs:
    script: |
      version=$(python3.10 -c 'import unitorch_microsoft; print(unitorch_microsoft.VERSION)')
      git config --global user.email "decu@microsoft.com"
      git config --global user.name "decu"
      version="v$version"
      if git rev-parse -q --verify "refs/tags/$version"; then
        git tag -d $version
      fi
      git tag $version
      git push origin :refs/tags/$version
      git push origin $version
  displayName: 'Update Tag To Latest Commit'
