[build-system]
requires = ["setuptools>=40.0", "torch"]
build-backend = "setuptools.build_meta"

[project]
name = "unitorch_microsoft"
authors = [
    {name = "decu", email = "decu@microsoft.com"},
]
description = "unitorch_microsoft provide more STOA models from Ads & Microsoft for unitorch."
readme = "README.md"
requires-python = ">=3.8"
keywords = ["PyTorch"]
license = {text = "MIT"}
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "Intended Audience :: Education",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dynamic = ["version", "dependencies"]

[project.optional-dependencies]
deepspeed = ["deepspeed==0.9.0", "mpi4py==3.1.4"]
diffusers = ["diffusers>=0.17.1"]
quantization = ["bitsandbytes>=0.41.1"]
all = ["unitorch[deepspeed,diffusers,quantization]"]

[project.scripts]
unitorch-train = "unitorch_microsoft.console.train:cli_main"
unitorch-eval = "unitorch_microsoft.console.eval:cli_main"
unitorch-infer = "unitorch_microsoft.console.infer:cli_main"
unitorch-script= "unitorch_microsoft.console.script:cli_main"
unitorch-service = "unitorch_microsoft.console.service:cli_main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = {attr = "unitorch_microsoft.VERSION"}
dependencies = {file = "requirements.txt"}
