[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.adinsights.generation.modeling_tulr_v6']
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv

# model
[microsoft/adinsights/model/classification/tulr/v6]
pretrained_name = tulrv6-base
num_classes = 1
pretrained_weight_path = https://unitorchblobfuse.blob.core.windows.net/shares/models/adsplus/pytorch_model.tulrv6.qac.click.81.99.bin

# dataset
[core/dataset/ast]
names = ['query', 'adid', 'position', 'title', 'description']

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/tulr/v6/classification(query, str(title) + " - " + str(description))',
    'core/process/number(position[2:] if position.startswith("ML") else 0, dtype="int", key="pos_ids")',
  ]

# process
[microsoft/process/tulr/v6]
pretrained_name = tulrv6-base
max_seq_length = 36

# postprocess
[core/process/classification]
act_fn = sigmoid

# task
[core/task/supervised]
model = microsoft/adinsights/model/classification/tulr/v6
dataset = core/dataset/ast
output_header = ['query', 'adid', 'position', 'title', 'description']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

num_workers = 8

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

test_batch_size = 64
