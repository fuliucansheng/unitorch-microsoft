[core/cli]
task_name = core/task/deepspeed/supervised
depends_libraries = ['unitorch_microsoft.models.mistral']
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.json
dev_file = ./dev.json
test_file = ./test.json
pretrained_weight_folder = ./Mistral-7B-Instruct-v0.1

# model
[microsoft/model/generation/peft/lora/mistral]
pretrained_name = mistral-7b-instruct-v0.1
quant_config_path = configs/quantization/4bit.json
pretrained_weight_path = [
	'${core/cli:pretrained_weight_folder}/pytorch_model-00001-of-00002.bin',
	'${core/cli:pretrained_weight_folder}/pytorch_model-00002-of-00002.bin',
  ]
max_gen_seq_length = 128

# dataset
[core/dataset/ast]
# names = ['instruction', 'input', 'output']
template = json

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    '''
    microsoft/process/mistral/generation(
	    "[INST] " + str(instruction).replace("{", "{{").replace("}", "}}") + " {0} [/INST]", input, output
    )
    ''',
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    '''
    microsoft/process/mistral/generation/inputs(
    	"[INST] " + str(instruction).replace("{", "{{").replace("}", "}}") + " {0} [/INST]", input
    )
    ''',
    'microsoft/process/mistral/generation/labels(output)',
  ]

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
    '''
    microsoft/process/mistral/generation/inputs(
    	"[INST] " + str(instruction).replace("{", "{{").replace("}", "}}") + " {0} [/INST]", input
    )
    ''',
  ]

# process
[microsoft/process/mistral]
pretrained_name = mistral-7b-instruct-v0.1
max_seq_length = 512
max_gen_seq_length = 128

[core/writer/csv]
escapechar = \

# task
[core/task/deepspeed/supervised]
config_path = configs/deepspeed/adamw.json
model = microsoft/model/generation/peft/lora/mistral
dataset = core/dataset/ast
loss_fn = core/loss/lm
score_fn = core/score/bleu
monitor_fns = ['core/score/bleu', 'core/score/rouge1', 'core/score/rouge2']
output_header = ['instruction', 'input', 'output']
postprocess_fn = microsoft/postprocess/mistral/detokenize
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

ckpt_freq = 2000
learning_rate = 0.00001

train_batch_size = 4
dev_batch_size = 4
test_batch_size = 4
