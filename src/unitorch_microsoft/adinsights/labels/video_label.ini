[core/cli]
depends_libraries = [
    "unitorch_microsoft.webuis.labeling",
  ]
enabled_webuis = [
    "microsoft/webui/labeling/classification",
  ]
data_file = ./datafile.tsv
result_file = ./result.tsv
http_url = None
checkbox = False
names = None
group_col = None
group_text_cols = None
text_cols = None
image_cols = None
video_cols = None
html_cols = None
show_cols = ${core/cli:names}
zip_cols = None
zip_http_url = None
choices = ["Left is Better", "Right is Better", "Tie", "All Bad"]
force_to_relabel = False

auth = [("Chang", "12345"), ("Rich", "12345"), ("Xiaoyu", "12345"), ("Huiyun", "12345"), ("Siwen", "12345"), ("Xuhai", "12345"), ("Song", "12345"), ("Roman", "12345"), ("Chris", "12345"), ("Mithum", "12345"), ("Yi", "12345"), ("Yunsheng", "12345"), ("Sudhanshu", "12345"), ("Shravya", "12345"), ("Deepti", "12345")]


[microsoft/webui/labeling/classification]
guideline = """
  In this task you will be choosing between two AI generated videos to indicate which is the better one.  You will see two videos to compare.  You should select from: 
  
  a. **The left video is better**
  b. **The right video is better**
  c. **Two videos are equally good (Tie)**
  d. **Both of the videos are bad** 
  
  The quality of video could be evaluated from 5 different perspectives:

  1. **Realism**: Adherence to reality and physical: It covers realism of scenes and characters. The logical coherence of video content is normal in the physical world. E.g., No human face/hand/text distortion.
  2. **Fluidity**: Motion should be natural. There’s no flicking, distortion phenomenon in the video. E.g., The range of motion should not be too large or too small.
  3. **Invariance**: Product and brand should be exactly the same as in the reference image.
  4. **Aesthetics**: It covers visual appeal and attractiveness. The video should have harmonious color schemes and no accessibility issues for captions.
  5. **Promotion Impact**: Does the animation hurt product promotion

  Video with any issues from the 5 perspectives should be labelled as bad.
  """
data_file = ${core/cli:data_file}
result_file = ${core/cli:result_file}
http_url = ${core/cli:http_url}
names = ${core/cli:names}
group_col = ${core/cli:group_col}
group_text_cols = ${core/cli:group_text_cols}
text_cols = ${core/cli:text_cols}
image_cols = ${core/cli:image_cols}
show_cols = ${core/cli:show_cols}
video_cols = ${core/cli:video_cols}
html_cols = ${core/cli:html_cols}
zip_cols = ${core/cli:zip_cols}
zip_http_url = ${core/cli:zip_http_url}
checkbox = ${core/cli:checkbox}
num_images_per_row = 5
choices = ${core/cli:choices}
force_to_relabel = ${core/cli:force_to_relabel}
