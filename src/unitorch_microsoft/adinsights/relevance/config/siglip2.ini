[core/cli]
task_name = core/task/supervised
cache_dir = ./cache
test_file = ./test.tsv

# model
[core/model/matching/siglip]
pretrained_name = siglip2-so400m-patch14-384

# dataset
[core/dataset/ast/test]
names = ['Rid','text','image_url','image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    "core/process/siglip/classification(text, core/process/image/read(image, image_type='base64'))",
  ]

# process
[core/process/siglip]
pretrained_name = siglip2-so400m-patch14-384
max_seq_length = 48

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/classification]
act_fn = sigmoid

# task
[core/task/supervised]
model = core/model/matching/siglip
dataset = core/dataset/ast
output_header = ['Rid','text','image_url']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128
