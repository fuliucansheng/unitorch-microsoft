[core/cli]
task_name = core/task/deepspeed/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv

# model
[core/model/pretrain/siglip]
gradient_checkpointing = True
pretrained_name = siglip2-so400m-patch14-384

# dataset
[core/dataset/ast]
# id, image, text
names = ['query', 'image', 'label']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    'core/process/siglip/classification(query, core/process/image/read(image))'
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    'core/process/siglip/classification(query, core/process/image/read(image))'
  ]


# process
[core/process/siglip]
max_seq_length = 128

[core/process/image]
http_url = '{0}'

# task
[core/task/deepspeed/supervised]
config_path = configs/deepspeed/adamw.json
model = core/model/pretrain/siglip
learning_rate = 0.0001
dataset = core/dataset/ast
score_fn = core/score/loss
monitor_fns = ['core/score/loss']

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}

num_workers = 16

train_batch_size = 128
dev_batch_size = 128
