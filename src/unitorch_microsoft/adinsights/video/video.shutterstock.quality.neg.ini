[core/cli]
depends_libraries = [
    'unitorch_microsoft.adinsights.video',
  ]
task_name = core/task/supervised
cache_dir = ./cache
from_ckpt_dir = ${core/cli:cache_dir}
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv
label_text = supercomputers text to images, Computer graphics, low res, blurry, distortion, printed words,text, watermark, logo, sticker design vector, oversaturated, stock illustration, noisy,old 3d graphics,solid color background intricate,diagram, trending on markets, neon electronic signs, black studio background color, editorial illustration, 3d concept, design sheet, aliased, dark desert background, holo sticker, coloured comic, render, mangled, logo in abstract style
lora_r = 4

# model
[core/model/matching/peft/lora/clip]
pretrained_name = clip-vit-large-patch14
pretrained_lora_weight_path = /data/xucha/VideoProcess/video_processing/dataset/ckpt/pytorch_model.bin
projection_dim = 768
lora_r = ${core/cli:lora_r}

# dataset
[core/dataset/ast]
# id, image, text
names = ['video','image', 'label']

[microsoft/adinsights/process/video]
sample_frame_num = 1


[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    'core/process/clip/classification("${core/cli:label_text}", microsoft/adinsights/process/video/read(video, sample_strategy="fix", sample_rate=[0.5])[0])',
    'core/process/label(1 - int(label))',
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    'core/process/clip/classification("${core/cli:label_text}", microsoft/adinsights/process/video/read(video, sample_strategy="fix", sample_rate=[0.5])[0])',
    'core/process/label(1 - int(label))',
  ]

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
    'core/process/clip/classification("${core/cli:label_text}", microsoft/adinsights/process/video/read(video, sample_strategy="fix", sample_rate=[0.5])[0])',
  ]

# process
[core/process/clip]
pretrained_name = clip-vit-large-patch14
max_seq_length = 77

[core/process/classification]
act_fn = sigmoid

# optim
[core/optim/adamw]
learning_rate = 0.00001

# scheduler
[core/scheduler/linear_warmup]
num_warmup_rate = 0.001

# task
[core/task/supervised]
model = core/model/matching/peft/lora/clip
dataset = core/dataset/ast
optim = core/optim/adamw
scheduler = core/scheduler/linear_warmup
loss_fn = core/loss/bce
score_fn = core/score/auc
monitor_fns = ['core/score/auc']
output_header = ['image', 'label']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16
epochs = 1000
log_freq = 100
save_checkpoint = best
save_optimizer = False
save_scheduler = False

train_batch_size = 2
dev_batch_size = 2
test_batch_size = 10