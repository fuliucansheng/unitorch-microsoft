[core/cli]
task_name = core/task/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
output_folder = ./flux_images
test_file = ./test.tsv
 
# model
[core/model/diffusers/text2image/stable_flux]
pretrained_name = stable-flux-schnell
width = 1024
height = 1024
 
# dataset
[core/dataset/ast/test]
names = ["rowid", "text"]
data_files = ${core/cli:test_file}
preprocess_functions = [
    'core/process/diffusion/stable_flux/text2image/inputs(text)',
  ]

# process
[core/process/diffusion/stable_flux]
pretrained_name = stable-flux-schnell
max_seq_length = 77
 
[core/process/diffusion]
output_folder = ${core/cli:output_folder}
 
# task
[core/task/supervised]
model = core/model/diffusers/text2image/stable_flux
dataset = core/dataset/ast
output_header = ["rowid", "text"]
postprocess_fn = core/postprocess/diffusion/image
writer = core/writer/csv
 
from_ckpt_dir = ${core/cli:from_ckpt_dir}
output_path = ${core/cli:cache_dir}/output.txt
 
num_workers = 16
 
test_batch_size = 1