[core/cli]
task_name = core/task/deepspeed/supervised
depends_libraries = ['unitorch_microsoft.models.bletchley']
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv

# model
[microsoft/model/pretrain/bletchley/v3]
config_type = 0.8B
projection_dim = 64
gradient_checkpointing = True
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/bletchley/v3/pytorch_model.base.bin

# dataset
[core/dataset/ast]
# id, image, text
names = ['query', 'image']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    'microsoft/process/bletchley/v3/classification(query, core/process/image/read(image))'
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    'microsoft/process/bletchley/v3/classification(query, core/process/image/read(image))'
  ]

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

# process
[microsoft/process/bletchley/v3]
max_seq_length = 36

# task
[core/task/deepspeed/supervised]
config_path = configs/deepspeed/adamw.json
model = microsoft/model/pretrain/bletchley/v3
learning_rate = 0.0001
dataset = core/dataset/ast
score_fn = core/score/loss
monitor_fns = ['core/score/loss']

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}

num_workers = 16

train_batch_size = 128
dev_batch_size = 128
