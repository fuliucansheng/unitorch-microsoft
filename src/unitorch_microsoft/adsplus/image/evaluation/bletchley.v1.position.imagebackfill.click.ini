[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.adsplus.image.bletchley_v1']
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv

# model
[microsoft/adsplus/image/bletchley/v1/position]
config_type = 0.3B
projection_dim = 64
hidden_size = 512
num_text_layers = 4
num_positions = 50
freeze_base_model = False
freeze_image_model = False
pretrained_weight_path = https://huggingface.co/datasets/fuliucansheng/unitorchblobfuse/resolve/main/models/bletchley/v1/pytorch_model.0.3B.bin

[core/dataset/ast/test]
names = ['query', 'position', 'image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v1/classification(query, core/process/image/read(image))',
    'core/process/number(position[2:] if position.lower().startswith("ml") else 0, dtype="int", key="pos_ids")',
  ]

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

# process
[microsoft/process/bletchley/v1]
max_seq_length = 36

# task
[core/task/supervised]
model = microsoft/adsplus/image/bletchley/v1/position
dataset = core/dataset/ast
output_header = ['query', 'position', 'image']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128