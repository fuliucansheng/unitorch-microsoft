
[core/cli]
task_name = core/task/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[core/model/classification/clip]
pretrained_name = clip-vit-base-patch16
projection_dim = 512
freeze_base_model = True
num_classes = 1
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/adsplus/image/pytorch_model.clip.click.85.06.bin

# dataset
[core/dataset/ast]
names = ['query', 'title', 'image', 'label']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = ['core/process/clip/classification(title, core/process/image/read(image))', 'core/process/label(label)']

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = ['core/process/clip/classification(title, core/process/image/read(image))', 'core/process/label(label)']

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
names = ['title', 'image']
preprocess_functions = ['core/process/clip/classification(title, core/process/image/read(image))']

# process
[core/process/clip]
pretrained_name = clip-vit-base-patch16
max_seq_length = 36

[core/process/image]
image_type = base64

# optim
[core/optim/adamw]
learning_rate = 0.0001

# scheduler
[core/scheduler/linear_warmup]
num_warmup_rate = 0.001
num_warmup_steps = 3000

# task
[core/task/supervised]
model = core/model/classification/clip
optim = core/optim/adamw
scheduler = core/scheduler/linear_warmup
dataset = core/dataset/ast
loss_fn = core/loss/bce
score_fn = core/score/auc
monitor_fns = ['core/score/auc']
output_header = ['query', 'title', 'image', 'label']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

train_batch_size = 128
dev_batch_size = 256
test_batch_size = 256