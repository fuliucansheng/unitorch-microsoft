[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.models.minigpt4']
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv
pretrained_weight_folder = ./MiniGPT-4-LLaMA-7B

# model
[microsoft/model/classification/minigpt4]
pretrained_name = minigpt4-7b
quant_config_path = configs/quantization/4bit.json
pretrained_weight_path = [
	'${core/cli:pretrained_weight_folder}/pytorch_model-00001-of-00002.bin',
	'${core/cli:pretrained_weight_folder}/pytorch_model-00002-of-00002.bin',
	'${core/cli:pretrained_weight_folder}/pytorch_model-00001-of-00006.bin',
	'${core/cli:pretrained_weight_folder}/pytorch_model.vicuna7b.bin',
  ]
gradient_checkpointing = True
num_classes = 1

# dataset
[core/dataset/ast]
names = ['query', 'image', 'label']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    '''
	core/process/minigpt4/generation/inputs(
		"Give the following image: <Img>ImageContent</Img>. You will be able to see the image once I provide it to you. Please answer my questions. ###Human: <Img>",
		"</Img> Is the text `{0}` relevant to the image? ###Assistant:".format(query),
		core/process/image/read(image)
	)
	''',
	'core/process/label(label)',
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    '''
	core/process/minigpt4/generation/inputs(
		"Give the following image: <Img>ImageContent</Img>. You will be able to see the image once I provide it to you. Please answer my questions. ###Human: <Img>",
		"</Img> Is the text `{0}` relevant to the image? ###Assistant:".format(query),
		core/process/image/read(image)
	)
	''',
	'core/process/label(label)',
  ]

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
    '''
	core/process/minigpt4/generation/inputs(
		"Give the following image: <Img>ImageContent</Img>. You will be able to see the image once I provide it to you. Please answer my questions. ###Human: <Img>",
		"</Img> Is the text `{0}` relevant to the image? ###Assistant:".format(query),
		core/process/image/read(image)
	)
	''',
  ]

# process
[core/process/minigpt4]
pretrained_name = minigpt4-7b
max_prefix_seq_length = 64
max_suffix_seq_length = 128

[core/process/image]
http_url = http://0.0.0.0:11230/?image={0}

# optim
[core/optim/adamw]
learning_rate = 0.00001

# scheduler
[core/scheduler/linear_warmup]
num_warmup_rate = 0.001

# task
[core/task/supervised]
model = microsoft/model/classification/minigpt4
optim = core/optim/adamw
scheduler = core/scheduler/linear_warmup
dataset = core/dataset/ast
loss_fn = core/loss/bce
score_fn = core/score/auc
monitor_fns = ['core/score/auc']
output_header = ['query', 'image', 'label']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 8

train_batch_size = 4
dev_batch_size = 4
test_batch_size = 4

