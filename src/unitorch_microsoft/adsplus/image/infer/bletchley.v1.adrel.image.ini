[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.models.bletchley']
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv

# model
[microsoft/model/matching/bletchley/v1]
config_type = 2.5B
projection_dim = 2048
gradient_checkpointing = True
output_image_embed = True
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/adsplus/image/pytorch_model.bletchley.v1.adrel.82.35.bin

# dataset
[core/dataset/ast/test]
data_files = ${core/cli:test_file}
names = ['id', 'image']
preprocess_functions = [
    'microsoft/process/bletchley/v1/image_classification(core/process/image/read(image))',
  ]

[core/process/image]
http_url = http://0.0.0.0:11230/?image={0}

[core/process/classification]
act_fn = sigmoid

# task
[core/task/supervised]
model = microsoft/model/matching/bletchley/v1
dataset = core/dataset/ast

output_header = ['id', 'image']
postprocess_fn = microsoft/postprocess/classification/embedding/string
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.tsv

num_workers = 16

test_batch_size = 128