[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.adsplus.image.bletchley_v1']
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv

# model
[microsoft/adsplus/image/bletchley/v1]
config_type = 0.3B
projection_dim = 64
hidden_size = 512
num_text_layers = 4
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/bletchley/v1/pytorch_model.0.3B.bin
output_image_embed = True

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
names = ['id','image']
preprocess_functions = [
    'microsoft/process/bletchley/v1/image_classification(core/process/image/read(image))',
  ]

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

# process
[microsoft/process/bletchley/v1]
max_seq_length = 36

# task
[core/task/supervised]
model = microsoft/adsplus/image/bletchley/v1
dataset = core/dataset/ast

output_header = ['id']
postprocess_fn = core/postprocess/classification/embedding/string
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128