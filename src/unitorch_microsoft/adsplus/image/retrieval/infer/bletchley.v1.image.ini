[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.adsplus.image.retrieval.bletchley_v1']
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[microsoft/adsplus/image/retrieval/matching/bletchley/v1]
text_config_type = 0.8B
image_config_type = 0.8B
projection_dim = 64
freeze_base_model = False
freeze_text_base_model = False
freeze_image_base_model = False
freeze_all_image_model = False
gradient_checkpointing = True
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/bletchley/v1/pytorch_model.0.8B.bin

# dataset
[core/dataset/ast]
names = ['image']

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v1/image_classification(core/process/image/read(image))',
  ]

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

# task
[core/task/supervised]
model = microsoft/adsplus/image/retrieval/matching/bletchley/v1
dataset = core/dataset/ast

output_header = ['image']
postprocess_fn = core/postprocess/classification/embedding/string
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 8
test_batch_size = 128