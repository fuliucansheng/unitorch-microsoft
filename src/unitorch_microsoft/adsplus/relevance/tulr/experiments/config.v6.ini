[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.adsplus.relevance.tulr']
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[microsoft/adsplus/relevance/classification/tulr/v6]
pretrained_name = tulrv6-base
num_classes = 1

# dataset
[core/dataset/ast]
names = ['task', 'query', 'web4ads', 'keyword', 'adtitle', 'addesc', 'displayurl', 'decorationtype', 'decoration', 'label']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    'core/process/number(task, dtype="int", key="task")',
    'microsoft/process/tulr/v6/classification(str(query) + " - " + str(web4ads),  str(decoration) + " - " + str(keyword) + " - " + str(adtitle) + " - " + str(addesc))',
    'core/process/label(label)'
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    'core/process/number(task, dtype="int", key="task")',
    'microsoft/process/tulr/v6/classification(str(query) + " - " + str(web4ads),  str(decoration) + " - " + str(keyword) + " - " + str(adtitle) + " - " + str(addesc))',
    'core/process/label(label)'
  ]

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
    'core/process/number(task, dtype="int", key="task")',
    'microsoft/process/tulr/v6/classification(str(query) + " - " + str(web4ads),  str(decoration) + " - " + str(keyword) + " - " + str(adtitle) + " - " + str(addesc))',
  ]

# process
[microsoft/process/tulr/v6]
pretrained_name = tulrv6-base
max_seq_length = 64

# optim
[core/optim/adamw]
learning_rate = 0.00001

# scheduler
[core/scheduler/linear_warmup]
num_warmup_rate = 0.001

# task
[core/task/supervised]
model = microsoft/adsplus/relevance/classification/tulr/v6
optim = core/optim/adamw
scheduler = core/scheduler/linear_warmup
dataset = core/dataset/ast
loss_fn = core/loss/bce
score_fn = core/score/auc
monitor_fns = ['core/score/auc']
output_header = ['task', 'query', 'web4ads', 'keyword', 'adtitle', 'addesc', 'displayurl', 'decorationtype', 'decoration', 'label']
post_process_fn = core/postprocess/classification/binary_score
writer_fn = core/writer/csv

learning_rate = 0.00001

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt
train_batch_size = 32
dev_batch_size = 32
test_batch_size = 64
