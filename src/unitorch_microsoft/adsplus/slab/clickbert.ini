[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.adsplus.click.modeling_bert']
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv

[microsoft/adsplus/click/classification/bert]
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/adsplus/slab/pytorch_model.adsplus.click.bert.bin

# dataset
[core/dataset/ast/test]
names = ['rowid', 'query', 'doc', 'lus_weight', 'pos_bias', 'sl_layout0', 'sl_layout1', 'sl_layout2']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'core/process/bert/classification(query, doc)',
    'core/process/number(lus_weight, dtype="float", key="lus_weight")',
    'core/process/number(pos_bias, dtype="float", key="pos_bias")',
    'core/process/features([int(sl_layout0), int(sl_layout1), int(sl_layout2)], pad=-1, num=3, dtype="int", key="sl_layout")',
  ]

# process
[core/process/bert]
pretrained_name = bert-base-uncased
max_seq_length = 64

[core/process/classification]
act_fn = sigmoid

# task
[core/task/supervised]
model = microsoft/adsplus/click/classification/bert
dataset = core/dataset/ast
output_header = ['rowid']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

num_workers = 8

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

test_batch_size = 256
