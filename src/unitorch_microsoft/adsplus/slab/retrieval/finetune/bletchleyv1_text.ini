[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.adsplus.slab.retrieval.modeling_bletchley_v1']
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[microsoft/adsplus/slab/retrieval/text_bletchleyv1/pairwise]
query_config_type = 0.3B
offer_config_type = 0.3B
freeze_base_model = False
num_class = 1
gradient_checkpointing = True

loss_type = 'bpr'
hinge_margin = 0.5
logit_scale_init_value = 2.6592
random_negative = 32
tp = 10.0

# dataset
[core/dataset/ast]
names = ['query', 'slab','label']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    'microsoft/process/bletchley/v1/text_classification(query, prefix="query_")',
    'microsoft/process/bletchley/v1/text_classification(slab, prefix="offer_")',
    'core/process/label(label)',
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    'microsoft/process/bletchley/v1/text_classification(query, prefix="query_")',
    'microsoft/process/bletchley/v1/text_classification(slab, prefix="offer_")',
    'core/process/label(label)',
  ]

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v1/text_classification(query, prefix="query_")',
    'microsoft/process/bletchley/v1/text_classification(slab, prefix="offer_")',
  ]

# process
[microsoft/process/bletchley/v1]
max_seq_length = 36

# optim
[core/optim/adamw]
learning_rate = 0.00001

# scheduler
[core/scheduler/linear_warmup]
num_warmup_rate = 0.001

# task
[core/task/supervised]
model = microsoft/adsplus/slab/retrieval/text_bletchleyv1/pairwise
dataset = core/dataset/ast
optim = core/optim/adamw
scheduler = core/scheduler/linear_warmup
score_fn = core/score/loss
monitor_fns = ['core/score/loss']

output_header = ['query', 'slab','label']
postprocess_fn = core/postprocess/classification/embedding/string
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 8
ckpt_freq = 5000

train_batch_size = 128
dev_batch_size = 128
test_batch_size = 128