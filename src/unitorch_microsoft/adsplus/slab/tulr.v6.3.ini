[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.adinsights.generation.modeling_tulr_v6']
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[microsoft/adinsights/model/classification/tulr/v6]
pretrained_name = tulrv6-base
num_classes = 1
pretrained_weight_path = https://unitorchblobfuse.blob.core.windows.net/shares/models/adsplus/pytorch_model.tulrv6.qasset.click.81.20.bin

# dataset
[core/dataset/ast]
names = ['query', 'asset']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    'microsoft/process/tulr/v6/classification(query, asset)',
    'core/process/number(1, dtype="int", key="pos_ids")',
    'core/process/number(1, dtype="int", key="type_ids")',
    'core/process/label(click)'
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    'microsoft/process/tulr/v6/classification(query, asset)',
    'core/process/number(1, dtype="int", key="pos_ids")',
    'core/process/number(1, dtype="int", key="type_ids")',
    'core/process/label(click)'
  ]

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/tulr/v6/classification(query, asset)',
    'core/process/number(1, dtype="int", key="pos_ids")',
    'core/process/number(1, dtype="int", key="type_ids")',
  ]

# process
[microsoft/process/tulr/v6]
pretrained_name = tulrv6-base
max_seq_length = 36

# optim
[core/optim/adamw]
learning_rate = 0.00001

# scheduler
[core/scheduler/linear_warmup]
num_warmup_rate = 0.001

# postprocess
[core/process/classification]
act_fn = sigmoid

# task
[core/task/supervised]
model = microsoft/adinsights/model/classification/tulr/v6
optim = core/optim/adamw
scheduler = core/scheduler/linear_warmup
dataset = core/dataset/ast
loss_fn = core/loss/bce
score_fn = core/score/auc
monitor_fns = ['core/score/auc']
output_header = ['query', 'asset']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

num_workers = 8
ckpt_freq = 3000

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt
train_batch_size = 32
dev_batch_size = 32
test_batch_size = 32
