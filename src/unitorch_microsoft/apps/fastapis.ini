[core/cli]
depends_libraries = [
    'unitorch_microsoft.models.diffusers',
    'unitorch_microsoft.apps.fastapis',
  ]
enabled_services = [
    "microsoft/apps/fastapi/bletchley/v1",
    "microsoft/apps/fastapi/bletchley/v3",
    "microsoft/apps/fastapi/siglip2",
    "microsoft/apps/fastapi/swin/googlecate",
    "microsoft/apps/fastapi/bletchley/msan/image_click",
  ]
device = cpu

# pipeline
[core/pipeline/bria]
device = ${core/cli:device}

[core/pipeline/llava/mistral_clip]
device = ${core/cli:device}

[core/pipeline/llava/llama_siglip]
device = ${core/cli:device}

[core/fastapi/pipeline/stable/text2image]
device = ${core/cli:device}

[core/fastapi/pipeline/stable/inpainting]
device = ${core/cli:device}

[core/fastapi/pipeline/stable_flux/text2image]
device = ${core/cli:device}

[core/fastapi/pipeline/stable_flux/inpainting]
device = ${core/cli:device}

[microsoft/models/bletchley/pipeline/v1/matching/v2]
device = ${core/cli:device}

[microsoft/models/bletchley/pipeline/v3/matching/v2]
device = ${core/cli:device}

[microsoft/models/siglip/pipeline/matching/v2]
device = ${core/cli:device}

[microsoft/spaces/fastapi/swin/googlecate]
device = ${core/cli:device}

[microsoft/omnipixel/pipeline/click/bletchley/image]
config_type = 0.8B
projection_dim = 1024
num_classes = 1
num_positions = 11
enable_text_encoder = False
pretrained_weight_path = https://huggingface.co/datasets/fuliucansheng/unitorchblobfuse/resolve/main/models/adsplus/pytorch_model.bletchley.v3.msan.image_click.bin
device = ${core/cli:device}