[core/cli]
depends_libraries = ['unitorch_microsoft.chatgpt']
data_file = ./data.tsv
output_file = ./output.txt
script_name = microsoft/script/chatgpt/dv3

[microsoft/script/chatgpt/dv3]
data_file = ${core/cli:data_file}
names = ["rowid", "query"]
index_col = rowid
prompt_text = '''
  We are currently optimizing a commercial search engine advertising system. One of our focus is on relevance tasks, which involve understanding the relationship between a given query and the ad text that users see alongside the search results. We also aim to measure the relevance between the query and the ad landing page, which is the web page that users are directed to after clicking on the ad. Your task is to identify the underlying intents of a user who typed a specific query. These intents will then be used for the aforementioned tasks.

  #Instruction
  Please provide the following information, enclosed within the designated tags, based on the given query:
  1. What product, service, information, etc. is the user looking for?
  2. What's mentioned brand, retailer name, etc. in the query?
  3. What category does the product belong to?
  4. What are the other products within the same category?
  5. Can you suggest similar products, services, information, accessories, etc. that might be useful to the user?
  6. Can you suggest any related products, services, information, accessories, etc. that might be useful to the user?
  7. Can you suggest any other products, brands, or information that the user might be interested in, based on the query they searched?

  Given Query {query}, provide above items between tags <AdQueryIntentMG> and </AdQueryIntentMG>AdQueryIntentMG>:
  '''
output_file = ${core/cli:output_file}

