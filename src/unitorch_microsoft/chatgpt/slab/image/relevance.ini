[core/cli]
depends_libraries = ['unitorch_microsoft.chatgpt']
data_file = ./data.tsv
output_file = ./output.txt
script_name = microsoft/script/chatgpt/gptv

[microsoft/script/chatgpt/gptv]
data_file = ${core/cli:data_file}
names = ['title', 'desc', 'desturl', 'dispurl', 'image', 'label']
prompt_text = '''
  I expect you as a search engine rater for the relevance between the image and the ad.

  The ad information considering the title, description and landing page url as follows:
  Title: {title}
  Description: {desc}
  Landing Page Url: {desturl}

  Is the image relevant to the ad?

  Answer Yes or No in <Result></Result> tag and explain why in <Explanation></Explanation> tag.
  '''
images = image
output_file = ${core/cli:output_file}

