[core/cli]
depends_libraries = ['unitorch_microsoft.china.c2s.selection']
query_file = ./query.tsv
doc_file = ./doc.tsv
output_file = ./output.tsv
script_name = microsoft/script/china/c2s/whoosh

[microsoft/script/china/c2s/whoosh]
query_file = ${core/cli:query_file}
