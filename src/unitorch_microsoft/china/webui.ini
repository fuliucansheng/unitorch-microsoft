[core/cli]
depends_libraries = [
    ; "unitorch_microsoft.china.webui", 
    "unitorch_microsoft.models.mask2former",
  ]
enabled_webuis = [
    "core/webui/mistral",
    ; "microsoft/china/webui",
    "microsoft/webui/mask2former",
    ; "core/webui/mistral",
    "core/webui/bria",
    "core/webui/detr",
    "core/webui/sam",
    ; "core/webui/stable",
    ; "core/webui/stable_xl",
    "core/webui/tools",
  ]
device = 0

# pipeline
[core/pipeline/bloom]
pretrained_name = bloomz-560m
max_seq_length = 256
max_gen_seq_length = 128
device = ${core/cli:device}

[core/pipeline/mistral]
pretrained_name = mistral-7b
quant_config_path = configs/quantization/4bit.json
max_seq_length = 512
max_gen_seq_length = 128
device = ${core/cli:device}

[core/pipeline/detr]
pretrained_name = detr-resnet-50
device = ${core/cli:device}

[core/pipeline/sam]
pretrained_name = sam-vit-base
device = ${core/cli:device}

[microsoft/pipeline/mask2former]
pretrained_name = picasso-mask2former-swin-base-ade-semantic
device = ${core/cli:device}

[core/pipeline/bria]
pretrained_weight_path = https://huggingface.co/briaai/RMBG-1.4/resolve/main/pytorch_model.bin
device = ${core/cli:device}

[core/pipeline/stable/text2image]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable/image2image]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable/inpainting]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable/resolution]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable/image2video]
enable_cpu_offload = True
enable_xformers = False
device = ${core/cli:device}

[core/pipeline/stable_xl/text2image]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable_xl/image2image]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable_xl/inpainting]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}
