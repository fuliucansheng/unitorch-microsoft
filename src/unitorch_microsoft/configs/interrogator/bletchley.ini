[core/cli]
depends_libraries = ['unitorch_microsoft.interrogators']
script_name = microsoft/script/interrogator/bletchley
data_file = ./data.tsv
names = ['image', 'label']
image_col = image
label_col = label
do_reverse = False
device = cpu

[microsoft/script/interrogator/bletchley]
data_file = ${core/cli:data_file}
names = ${core/cli:names}
image_col = ${core/cli:image_col}
label_col = ${core/cli:label_col}
do_reverse = ${core/cli:do_reverse}

[microsoft/interrogator/bletchley]
config_type = 2.5B
projection_dim = 1024
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/bletchley/v3/pytorch_model.large.bin
device = ${core/cli:device}