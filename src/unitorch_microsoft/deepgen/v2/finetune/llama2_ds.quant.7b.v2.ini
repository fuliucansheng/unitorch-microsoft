[core/cli]
task_name = core/task/deepspeed/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv
pretrained_weight_folder = ./llama-2-7b-chat-hf

# model
[core/model/generation/peft/lora/llama]
pretrained_name = llama-7b
quant_config_path = configs/quantization/4bit.json
pretrained_weight_path = [
	'${core/cli:pretrained_weight_folder}/pytorch_model-00001-of-00002.bin',
	'${core/cli:pretrained_weight_folder}/pytorch_model-00002-of-00002.bin',
  ]
max_gen_seq_length = 128

# dataset
[core/dataset/ast]
names = ['instruction', 'input', 'output']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    '''
    core/process/llama/instruction/generation(
      "Below is an instruction that describes a task. Write a response that appropriately completes the request. ### Instruction: " + instruction + " {0} ### Responses: ",
      "### Input: {0}".format(input),
      output
    )
    ''',
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    '''
    core/process/llama/instruction/generation/inputs(
      "Below is an instruction that describes a task. Write a response that appropriately completes the request. ### Instruction: " + instruction + " {0} ### Responses: ",
      "### Input: {0}".format(input),
    )
    ''',
    'core/process/llama/generation/labels(output)',
  ]

[core/dataset/ast/test]
names = ['instruction', 'input']
data_files = ${core/cli:test_file}
preprocess_functions = [
    '''
    core/process/llama/instruction/generation/inputs(
      "Below is an instruction that describes a task. Write a response that appropriately completes the request. ### Instruction: " + instruction + " {0} ### Responses: ",
      "### Input: {0}".format(input),
    )
    ''',
  ]

# process
[core/process/llama]
pretrained_name = llama-7b
max_seq_length = 256
max_gen_seq_length = 128

[core/writer/csv]
escapechar = \

# task
[core/task/deepspeed/supervised]
config_path = configs/deepspeed/adamw.json
model = core/model/generation/peft/lora/llama
dataset = core/dataset/ast
loss_fn = core/loss/lm
score_fn = core/score/bleu
monitor_fns = ['core/score/bleu', 'core/score/rouge1', 'core/score/rouge2', 'core/score/rougel']
output_header = ['instruction', 'input']
postprocess_fn = core/postprocess/llama/detokenize
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

ckpt_freq = 2000
learning_rate = 0.00001

train_batch_size = 4
dev_batch_size = 4
test_batch_size = 4
