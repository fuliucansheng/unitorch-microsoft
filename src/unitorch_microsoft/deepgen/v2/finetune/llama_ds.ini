[core/cli]
task_name = core/task/deepspeed/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[core/model/generation/llama]
pretrained_name = open-llama-3b
gradient_checkpointing = True
max_gen_seq_length = 128

# dataset
[core/dataset/ast]
names = ['instruction', 'encode', 'decode']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    '''
    core/process/llama/generation(
        "Below is an instruction that describes a task. Write a response that appropriately completes the request. ### Instruction: {0}{1} ### Responses: ".format(
          instruction, 
          " ### Input: {0}".format(encode) if encode else "",
        ),
        decode
    )
    ''',
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    '''
    core/process/llama/generation/inputs(
        "Below is an instruction that describes a task. Write a response that appropriately completes the request. ### Instruction: {0}{1} ### Responses: ".format(
          instruction, 
          " ### Input: {0}".format(encode) if encode else "",
        ),
    )
    ''',
    'core/process/llama/generation/labels(decode)',
  ]

[core/dataset/ast/test]
names = ['instruction', 'encode']
data_files = ${core/cli:test_file}
preprocess_functions = [
    '''
    core/process/llama/generation/inputs(
        "Below is an instruction that describes a task. Write a response that appropriately completes the request. ### Instruction: {0}{1} ### Responses: ".format(
          instruction, 
          " ### Input: {0}".format(encode) if encode else "",
        ),
    )
    ''',
  ]

# process
[core/process/llama]
pretrained_name = open-llama-3b
max_seq_length = 256
max_gen_seq_length = 128

[core/writer/csv]
escapechar = \

# task
[core/task/deepspeed/supervised]
config_path = configs/deepspeed/adamw.json
model = core/model/generation/llama
dataset = core/dataset/ast
loss_fn = core/loss/lm
score_fn = core/score/bleu
monitor_fns = ['core/score/bleu', 'core/score/rouge1', 'core/score/rouge2', 'core/score/rougel']
output_header = ['instruction', 'encode']
postprocess_fn = core/postprocess/llama/detokenize
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

ckpt_freq = 2000
learning_rate = 0.00001

train_batch_size = 16
dev_batch_size = 16
test_batch_size = 16
