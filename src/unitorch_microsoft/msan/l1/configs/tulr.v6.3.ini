[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.models.tulr', 'unitorch_microsoft.msan.l1']
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[microsoft/msan/l1/model/classification/tulr/v6/v3]
pretrained_name = tulrv6-base
num_classes = 1

# dataset
[core/dataset/ast]
names = ['user_id', 'tg_id', 'demand_type_id', 'market_id', 'ad_position_id', 'uet_events', 'search_events', 'ad_keyword', 'ad_title', 'ad_url', 'ad_desc', 'ad_sn', 'label']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
  '''
  microsoft/msan/l1/process/tulr/v6/classification/v2(
    (search_events.split(" #$$# ") if search_events else []) + (uet_events.split(" #$$# ") if uet_events else []),
    (ad_keyword if ad_keyword else "") + " - " + (ad_title if ad_title else "") + " - " + (ad_desc if ad_desc else "")
  )
  ''', 
  'core/process/number(tg_id[1:], dtype="int", key="tg_ids")',
  'core/process/number(demand_type_id[1:], dtype="int", key="demand_ids")',
  'core/process/number(market_id[1:], dtype="int", key="market_ids")',
  'core/process/number(ad_position_id[1:], dtype="int", key="pos_ids")',
  'core/process/label(label)'
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
  '''
  microsoft/msan/l1/process/tulr/v6/classification/v2(
    (search_events.split(" #$$# ") if search_events else []) + (uet_events.split(" #$$# ") if uet_events else []),
    (ad_keyword if ad_keyword else "") + " - " + (ad_title if ad_title else "") + " - " + (ad_desc if ad_desc else "")
  )
  ''', 
  'core/process/number(tg_id[1:], dtype="int", key="tg_ids")',
  'core/process/number(demand_type_id[1:], dtype="int", key="demand_ids")',
  'core/process/number(market_id[1:], dtype="int", key="market_ids")',
  'core/process/number(ad_position_id[1:], dtype="int", key="pos_ids")',
  'core/process/label(label)'
  ]

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
  '''
  microsoft/msan/l1/process/tulr/v6/classification/v2(
    (search_events.split(" #$$# ") if search_events else []) + (uet_events.split(" #$$# ") if uet_events else []),
    (ad_keyword if ad_keyword else "") + " - " + (ad_title if ad_title else "") + " - " + (ad_desc if ad_desc else "")
  )
  ''',
  'core/process/number(tg_id[1:], dtype="int", key="tg_ids")',
  'core/process/number(demand_type_id[1:], dtype="int", key="demand_ids")',
  'core/process/number(market_id[1:], dtype="int", key="market_ids")',
  'core/process/number(ad_position_id[1:], dtype="int", key="pos_ids")',
  ]

# process
[microsoft/msan/l1/process/tulr/v6]
pretrained_name = tulrv6-base
max_num_text = 25
max_seq_length = 128

# optim
[core/optim/adamw]
learning_rate = 0.00001

# scheduler
[core/scheduler/linear_warmup]
num_warmup_rate = 0.001

# task
[core/task/supervised]
model = microsoft/msan/l1/model/classification/tulr/v6/v3
optim = core/optim/adamw
scheduler = core/scheduler/linear_warmup
dataset = core/dataset/ast
loss_fn = core/loss/bce
score_fn = core/score/auc
monitor_fns = ['core/score/auc']
output_header = ['user_id', 'tg_id', 'demand_type_id', 'market_id', 'ad_position_id', 'uet_events', 'search_events', 'ad_keyword', 'ad_title', 'ad_url', 'ad_desc', 'ad_sn', 'label']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

num_workers = 8
ckpt_freq = 3000

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt
train_batch_size = 64
dev_batch_size = 64
test_batch_size = 64
