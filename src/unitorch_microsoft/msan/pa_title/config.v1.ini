[core/cli]
depends_libraries = ['unitorch_microsoft.msan.pa_title']
script_name = microsoft/msan/pa_title/chatgpt
key = ""
endpoint = ""
deploy_name = ""
data_file = ./data.tsv
output_file = ./output.tsv

[microsoft/msan/pa_title/chatgpt]
key = ${core/cli:key}
endpoint = ${core/cli:endpoint}
deploy_name = ${core/cli:deploy_name}
max_tokens = 100
temperature = 1.0
top_p = 1.0
retry_times = 1

data_file = ${core/cli:data_file}
names = ['offerid', 'title', 'url', 'brand']
title = title
url = url
brand = brand

output_file = ${core/cli:output_file}