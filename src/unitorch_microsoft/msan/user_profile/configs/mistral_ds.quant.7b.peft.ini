[core/cli]
task_name = core/task/deepspeed/supervised
depends_libraries = ['unitorch_microsoft.msan.user_profile']
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv
pretrained_weight_folder = ./Mistral-7B-Instruct-v0.1

# model
[microsoft/msan/user_profile/classification/peft/lora/mistral]
config_path = ${core/cli:pretrained_weight_folder}/config.json
quant_config_path = configs/quantization/4bit.json
pretrained_weight_path = [
	'${core/cli:pretrained_weight_folder}/pytorch_model-00001-of-00002.bin',
	'${core/cli:pretrained_weight_folder}/pytorch_model-00002-of-00002.bin',
  ]

# dataset
[core/dataset/ast]
names = ['instruction', 'input', 'age', 'gender']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    '''
    core/process/mistral/generation/inputs(
    	"[INST] " + str(instruction).replace("{", "{{").replace("}", "}}") + " {0} [/INST]", input
    )
    ''',
    'core/process/number(int(age), dtype="int", key="age_labels")',
    'core/process/number(int(gender), dtype="int", key="gender_labels")',
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    '''
    core/process/mistral/generation/inputs(
    	"[INST] " + str(instruction).replace("{", "{{").replace("}", "}}") + " {0} [/INST]", input
    )
    ''',
    'core/process/number(int(age), dtype="int", key="age_labels")',
    'core/process/number(int(gender), dtype="int", key="gender_labels")',
  ]

[core/dataset/ast/test]
names = ['instruction', 'input', 'age', 'gender']
data_files = ${core/cli:test_file}
preprocess_functions = [
    '''
    core/process/mistral/generation/inputs(
    	"[INST] " + str(instruction).replace("{", "{{").replace("}", "}}") + " {0} [/INST]", input
    )
    ''',
  ]

# process
[microsoft/process/mistral]
vocab_path = ${core/cli:pretrained_weight_folder}/tokenizer.model
max_seq_length = 256

# task
[core/task/deepspeed/supervised]
config_path = configs/deepspeed/adamw.fp32.json
model = microsoft/msan/user_profile/classification/peft/lora/mistral
dataset = core/dataset/ast
loss_fn = core/loss/loss
score_fn = core/score/loss
monitor_fns = ['core/score/loss']
output_header = ['instruction', 'input', 'age', 'gender']
postprocess_fn = microsoft/postprocess/classification/embedding/string
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

ckpt_freq = 2000
log_freq = 10
learning_rate = 0.00001

train_batch_size = 4
dev_batch_size = 4
test_batch_size = 4
