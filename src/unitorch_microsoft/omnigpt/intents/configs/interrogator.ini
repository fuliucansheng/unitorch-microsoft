[core/cli]
depends_libraries = ['unitorch_microsoft.omnigpt.intents']
script_name = microsoft/omnigpt/script/intents/interrogator/bletchley
data_file = ./data_file.tsv
phrase_file = ./phrases.tsv
output_file = ./output.txt

[microsoft/omnigpt/script/intents/interrogator/bletchley]
data_file = ${core/cli:data_file}
names = ['query', 'doc']
text_col = query
pair_col = doc
output_file = ${core/cli:output_file}

[microsoft/omnigpt/pipeline/intents/interrogator/bletchley]
pretrained_config_type = 0.8B
phrase_file = ${core/cli:phrase_file}
device = 0