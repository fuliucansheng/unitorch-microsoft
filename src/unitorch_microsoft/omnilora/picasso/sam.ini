[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.models.sam']
cache_dir = ./cache
from_ckpt_dir = ${core/cli:cache_dir}
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[microsoft/model/segmentation/peft/lora/sam]
pretrained_name = sam-vit-large
lora_r = 4

# dataset
[core/dataset/ast]
# id, image, text
names = ['image', 'mask']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    'microsoft/process/sam/segmentation(core/process/image/read(image), core/process/image/read(mask))',
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    'microsoft/process/sam/segmentation(core/process/image/read(image), core/process/image/read(mask))',
  ]

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

# process
[microsoft/process/sam]
pretrained_name = sam-vit-large

# optim
[core/optim/adam]
learning_rate = 0.00001

# scheduler
[core/scheduler/linear_warmup]
num_warmup_rate = 0.001

# task
[core/task/supervised]
model = microsoft/model/segmentation/peft/lora/sam
dataset = core/dataset/ast
optim = core/optim/adam
scheduler = core/scheduler/linear_warmup
loss_fn = core/loss/loss
score_fn = core/score/loss
monitor_fns = ['core/score/loss']

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}

num_workers = 16
epochs = 50
log_freq = 100
save_checkpoint = best
save_optimizer = False
save_scheduler = False

train_batch_size = 2
dev_batch_size = 2
