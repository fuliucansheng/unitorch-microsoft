[core/cli]
task_name = core/task/supervised
output_file = ./output.txt
test_file = ./test.tsv

# model
[core/model/matching/clip]
pretrained_name = clip-vit-huge-patch14-hpsv2
projection_dim = 1024
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/adsplus/diffusion/pytorch_model.hpsv2.1.bin

# dataset
[core/dataset/ast/test]
names = ['text', 'image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'core/process/clip/classification(text, core/process/image/read(image))',
  ]

# process
[core/process/clip]
pretrained_name = clip-vit-huge-patch14-hpsv2
max_seq_length = 77

[core/process/image]
http_url = None

[core/process/classification]
act_fn = None

# task
[core/task/supervised]
model = core/model/matching/clip
dataset = core/dataset/ast
output_header = ['text', 'image']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

output_path = ${core/cli:output_file}

num_workers = 16

test_batch_size = 128
