[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.omnipixel.models']

test_file = ./test.tsv
cache_dir = ./cache

# model
[microsoft/omnipixel/model/AIDetect]
pretrained_weight_path = https://huggingface.co/datasets/fuliucansheng/unitorchblobfuse/resolve/main/models/adsplus/image/AIDE_sd14_train-002.bin


# dataset
[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/omnipixel/process/AIDetect/classification(core/process/image/read(image))',
  ]

# process
[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/classification]
act_fn = None

# task
[core/task/supervised]
model = microsoft/omnipixel/model/AIDetect
dataset = core/dataset/ast
output_header = ['image']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128
