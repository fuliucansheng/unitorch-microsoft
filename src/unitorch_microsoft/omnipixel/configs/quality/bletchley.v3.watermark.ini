[core/cli]
depends_libraries = ['unitorch_microsoft.models.bletchley']
task_name = core/task/supervised
cache_dir = ./cache
test_file = ./test.tsv

# model
[microsoft/model/matching/bletchley/v3/v2]
config_type = 2.5B
projection_dim = 1024
gradient_checkpointing = False
labels = ["watermarked, no watermark signature, brand logo"]
pretrained_weight_path = https://huggingface.co/datasets/fuliucansheng/unitorchblobfuse/resolve/main/models/bletchley/v3/pytorch_model.large.bin
pretrained_lora_weight_path = https://huggingface.co/datasets/fuliucansheng/unitorchblobfuse/resolve/main/models/adsplus/lora/bletchley/pytorch_model.v3.2.5B.lora4.watermark.2410.bin

# dataset
[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v3/image_classification(core/process/image/read(image))',
  ]

# process
[microsoft/process/bletchley/v3]
max_seq_length = 36

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/classification]
act_fn = sigmoid

# task
[core/task/supervised]
model = microsoft/model/matching/bletchley/v3/v2
dataset = core/dataset/ast
output_header = ['image']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128
