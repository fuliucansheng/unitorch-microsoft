[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.omnipixel.models']

test_file = ./test.tsv
cache_dir = ./cache

[microsoft/omnipixel/model/realfake]
# 模型配置
model_name = convnext_large
num_classes = 2
pretrained = true
gradient_checkpointing = false
pretrained_weight_path = https://huggingface.co/datasets/fuliucansheng/unitorchblobfuse/resolve/main/models/adsplus/image/convnext_large-epoch%253D04-val_acc%253D0.9978.bin

# dataset
[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/omnipixel/process/realfake/classification(core/process/image/read(image))',
  ]


[core/process/classification]
act_fn = sigmoid

# task
[core/task/supervised]
model = microsoft/omnipixel/model/realfake
dataset = core/dataset/ast
output_header = ['image']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128
