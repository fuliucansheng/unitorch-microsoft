[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.omnipixel.models']
output_file = ./output.txt
test_file = ./test.tsv

# model
[microsoft/omnipixel/model/siglip/image]
pretrained_name = siglip-so400m-patch14-384


# dataset
[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'core/process/siglip/image_classification(core/process/image/read(image))',
  ]

# process
[core/process/siglip]
pretrained_name = siglip-so400m-patch14-384
max_seq_length = 77

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/classification]
act_fn = None

# task
[core/task/supervised]
model = microsoft/omnipixel/model/siglip/image
dataset = core/dataset/ast
output_header = ['image']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

output_path = ${core/cli:output_file}

num_workers = 16

test_batch_size = 128
