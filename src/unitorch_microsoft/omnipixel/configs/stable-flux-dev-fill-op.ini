[core/cli]
depends_libraries = [
    'unitorch_microsoft.omnipixel',
    'unitorch_microsoft.omnipixel.stable_flux',
    'unitorch_microsoft.models.diffusers',
  ]
task_name = core/task/supervised
from_ckpt_dir = ./cache
pretrained_weight_folder = ./pretrained_weight_folder
cache_dir = ./cache
test_file = ./test.tsv
ratio = 1.91
max_pad_ratio = -1.0

# model
[microsoft/omnipixel/diffusers/inpainting/stable_flux]
pretrained_name = stable-flux-dev-fill
pretrained_weight_folder = ${core/cli:pretrained_weight_folder}
pretrained_lora_names = stable-flux-lora-ms-dev-fill-simple
num_infer_timesteps = 30

# dataset
[core/dataset/ast/test]
names = ["prompt", "image"]
data_files = ${core/cli:test_file}
preprocess_functions = [
    '''
    core/process/diffusion/stable_flux/inpainting/inputs(
      prompt,
      *microsoft/omnipixel/process/outpainting/fitting(core/process/image/read(image), ratio=${core/cli:ratio}, max_longest_size=1024, max_pad_ratio=${core/cli:max_pad_ratio}),
    )
    '''
  ]

# process
[core/process/diffusion/stable_flux]
pretrained_name = stable-flux-dev-fill
max_seq_length = 77

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/diffusion]
http_url = http://0.0.0.0:11231/?name={0}

# task
[core/task/supervised]
model = microsoft/omnipixel/diffusers/inpainting/stable_flux
dataset = core/dataset/ast
output_header = ["prompt", "image"]
postprocess_fn = core/postprocess/diffusion/image
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 1
