[core/cli]
depends_libraries = [
    "unitorch_microsoft.omnipixel.stable_flux",
  ]
task_name = core/task/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv

# model
[microsoft/omnipixel/diffusers/inpainting/stable_flux]
pretrained_name = stable-flux-schnell-ms-fill
num_infer_timesteps = 30

# dataset
[core/dataset/ast/test]
names = ["image"]
data_files = ${core/cli:test_file}
preprocess_functions = [
    '''
    core/process/diffusion/stable_flux/inpainting/inputs(
      "",
      *microsoft/omnipixel/process/outpainting/fitting(core/process/image/read(image), 1.91),
    )
    '''
  ]

# process
[core/process/diffusion/stable_flux]
pretrained_name = stable-flux-schnell-ms-fill
max_seq_length = 77

[core/process/diffusion]
http_url = http://0.0.0.0:11231/?name={0}

# task
[core/task/supervised]
model = microsoft/omnipixel/diffusers/inpainting/stable_flux
dataset = core/dataset/ast
output_header = ["text"]
postprocess_fn = core/postprocess/diffusion/image
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 4
