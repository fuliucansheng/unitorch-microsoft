[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.omnipixel.modeling_click']
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[microsoft/omnipixel/model/click/bletchley/image]
config_type = 0.8B
projection_dim = 1024
num_classes = 1
num_positions = 11
enable_text_encoder = False
freeze_base_model = False
freeze_image_model = False
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/adsplus/pytorch_model.bletchley.v3.msan.image_click.bin

# dataset
[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v1/image_classification(core/process/image/read(image))',
    '''
    core/process/number(
      core/process/map(
        "edgechrntp-river-2", 
        default="10",
      ),
      dtype="int",
      key="pos_ids",
    )
    ''',
  ]

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

# process
[core/process]
# edgechrntp-river-2;edgechrntp-infopane-4;ar-rectangle-1;edgechrntp-infopane-3;ar-rectangle-2;edgechrntp-river-4;edgechrntp-river-1;webcompar-river-4;ar-sliver-2;ar-sliver-1
map_dict = {
    'edgechrntp-river-2': 0,
    'edgechrntp-infopane-4': 1,
    'ar-rectangle-1': 2,
    'edgechrntp-infopane-3': 3,
    'ar-rectangle-2': 4,
    'edgechrntp-river-4': 5,
    'edgechrntp-river-1': 6,
    'webcompar-river-4': 7,
    'ar-sliver-2': 8,
    'ar-sliver-1': 9
  }

[microsoft/process/bletchley/v1]
max_seq_length = 36

[core/process/classification]
act_fn = sigmoid

# task
[core/task/supervised]
model = microsoft/omnipixel/model/click/bletchley/image
dataset = core/dataset/ast
output_header = ['image']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128
