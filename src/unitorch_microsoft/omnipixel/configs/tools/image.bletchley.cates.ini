[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.models.bletchley']

test_file = ./test.tsv
cache_dir = ./cache

# model
[microsoft/model/classification/bletchley/v3/image]
config_type = 2.5B
projection_dim = 1024
freeze_base_model = False
num_classes = 19
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/adsplus/image/pytorch_model.bletchley.v3.cate.2502.bin

# dataset

[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v3/image_classification(core/process/image/read(image))',
  ]

# process
[microsoft/process/bletchley/v3]
max_seq_length = 36

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/classification]
act_fn = softmax
id2label = {
    0: "Animals",
    1: "Plants",
    2: "People,Scenery",
    3: "Sports",
    4: "Transportation",
    5: "Food",
    6: "Everyday Items",
    7: "Clothing & Beauty Products",
    8: "Home & Living",
    9: "Products",
    10: "Daily Life Scenes",
    11: "Machinery",
    12: "Medical",
    13: "City",
    14: "Architecture",
    15: "Visual Design",
    16: "Cartoons & Anime",
    17: "Games",
    18: "Others"
  }

# task
[core/task/supervised]
model = microsoft/model/classification/bletchley/v3/image
dataset = core/dataset/ast
output_header = ['image']
postprocess_fn = core/postprocess/classification/score
writer = core/writer/csv

output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 4
