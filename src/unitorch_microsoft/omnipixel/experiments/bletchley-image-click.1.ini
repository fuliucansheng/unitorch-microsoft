[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.omnipixel.bletchley']
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[microsoft/omnipixel/model/click/bletchley/image]
config_type = 0.8B
projection_dim = 1024
num_classes = 1
num_positions = 11
enable_text_encoder = False
freeze_base_model = False
freeze_image_model = False
pretrained_weight_path = https://huggingface.co/datasets/fuliucansheng/unitorchblobfuse/resolve/main/models/bletchley/v1/pytorch_model.0.8B.bin

# dataset
[core/dataset/ast]
# id, image, text
names = ['place', 'adid', 'url1', 'url2', 'image', 'label']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    'microsoft/process/bletchley/v1/image_classification(core/process/image/read(image))',
    'core/process/number(core/process/map(place, default="10"), dtype="int", key="pos_ids")',
    'core/process/label(label)',
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    'microsoft/process/bletchley/v1/image_classification(core/process/image/read(image))',
    'core/process/number(core/process/map(place, default="10"), dtype="int", key="pos_ids")',
    'core/process/label(label)',
  ]

[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v1/image_classification(core/process/image/read(image))',
    'core/process/number(core/process/map("edgechrntp-river-2", default="10"), dtype="int", key="pos_ids")',
  ]

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

# process
[microsoft/process]
# edgechrntp-river-2;edgechrntp-infopane-4;ar-rectangle-1;edgechrntp-infopane-3;ar-rectangle-2;edgechrntp-river-4;edgechrntp-river-1;webcompar-river-4;ar-sliver-2;ar-sliver-1
map_dict = {
    'edgechrntp-river-2': 0,
    'edgechrntp-infopane-4': 1,
    'ar-rectangle-1': 2,
    'edgechrntp-infopane-3': 3,
    'ar-rectangle-2': 4,
    'edgechrntp-river-4': 5,
    'edgechrntp-river-1': 6,
    'webcompar-river-4': 7,
    'ar-sliver-2': 8,
    'ar-sliver-1': 9
  }

[microsoft/process/bletchley/v1]
max_seq_length = 36

# optim
[core/optim/adamw]
learning_rate = 0.00001

# scheduler
[core/scheduler/linear_warmup]
num_warmup_rate = 0.001

# task
[core/task/supervised]
model = microsoft/omnipixel/model/click/bletchley/image
dataset = core/dataset/ast
optim = core/optim/adamw
scheduler = core/scheduler/linear_warmup
loss_fn = core/loss/bce
score_fn = core/score/auc
monitor_fns = ['core/score/auc']
output_header = ['image']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16
save_checkpoint = best

train_batch_size = 64
dev_batch_size = 64
test_batch_size = 128