[core/cli]
depends_libraries = [
    'unitorch_microsoft.omnipixel',
    'unitorch_microsoft.models.diffusers',
  ]
task_name = core/task/deepspeed/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
output_folder = ./images
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[core/model/diffusers/peft/lora/inpainting/stable_flux]
pretrained_name = stable-flux-dev-redux-fill
enable_text_adapter = False
enable_transformer_adapter = True
guidance_scale = 1.0
lora_r = 4

# dataset
[core/dataset/ast]
names = ['text', 'redux_image', 'image', 'mask']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    '''
    core/process/diffusion/stable_flux/inpainting(
      text,
      core/process/image/read(image),
      core/process/image/read(mask),
    )
    ''',
    'core/process/diffusion/stable_flux/redux_image(redux_image)',
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    '''
    core/process/diffusion/stable_flux/inpainting(
      text,
      core/process/image/read(image),
      core/process/image/read(mask),
    )
    ''',
    'core/process/diffusion/stable_flux/redux_image(redux_image)',
  ]

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
    '''
    core/process/diffusion/stable_flux/inpainting/inputs(
      text,
      core/process/image/read(image),
      core/process/image/read(mask),
    )
    ''',
    'core/process/diffusion/stable_flux/redux_image(redux_image)',
  ]

# process
[core/process/diffusion/stable_flux]
pretrained_name = stable-flux-dev-redux-fill
max_seq_length = 77
image_size = (1024, 1024)

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/diffusion]
output_folder = ${core/cli:output_folder}

# task
[core/task/deepspeed/supervised]
config_path = omnipixel/configs/adamw.bf16.json
model = core/model/diffusers/peft/lora/inpainting/stable_flux
dataset = core/dataset/ast
score_fn = core/score/loss
monitor_fns = ['core/score/loss']
output_header = ['text']
postprocess_fn = core/postprocess/diffusion/image
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16
log_freq = 100
save_checkpoint = all
grad_acc_steps = 8
learning_rate = 1e-5

train_batch_size = 1
dev_batch_size = 1
test_batch_size = 1
