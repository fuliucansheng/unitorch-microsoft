[core/cli]
task_name = core/task/deepspeed/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
output_folder = ./images
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[core/model/diffusers/text2image/stable]
pretrained_name = stable-v1.5-realistic-v5.1
snr_gamma = 5.0

# dataset
[core/dataset/ast]
names = ['prompt', 'image']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    'core/process/diffusion/stable/text2image(prompt, core/process/image/read(image))'
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    'core/process/diffusion/stable/text2image(prompt, core/process/image/read(image))'
  ]

[core/dataset/ast/test]
names = ['text']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'core/process/diffusion/stable/text2image/inputs(prompt)',
  ]

# process
[core/process/diffusion/stable]
pretrained_name = stable-v1.5-realistic-v5.1
max_seq_length = 77
image_size = (768,768)

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/diffusion]
output_folder = ${core/cli:output_folder}

# task
[core/task/deepspeed/supervised]
config_path = omnipixel/configs/adamw.json
model = core/model/diffusers/text2image/stable
dataset = core/dataset/ast
score_fn = core/score/loss
monitor_fns = ['core/score/loss']
output_header = ['prompt']
postprocess_fn = core/postprocess/diffusion/image
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16
log_freq = 100
ckpt_freq = 3000
learning_rate = 0.0001
save_checkpoint = latest

train_batch_size = 8
dev_batch_size = 8
test_batch_size = 4
