[core/cli]
depends_libraries = ['unitorch_microsoft.models.diffusers']
task_name = core/task/deepspeed/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
output_folder = ./videos
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[microsoft/model/diffusers/peft/lora/image2video/wan]
pretrained_name = wan-v2.1-i2v-14b-480p
scheduler_config_path = omnipixel/configs/flow.json
enable_text_adapter = False
latent_option = 3
lora_r = 4
seed = 42

# dataset
[core/dataset/ast]
names = ['text','image','video']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    '''
    microsoft/process/diffusion/wan/image2video(
        text, 
        core/process/video/sample(
            core/process/video/read(video),
            freq=0,
            num=81,
            mode="first",
        )
    )
    '''
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    '''
    microsoft/process/diffusion/wan/image2video(
        text, 
        core/process/video/sample(
            core/process/video/read(video),
            freq=0,
            num=81,
            mode="first",
        )
    )
    '''
  ]

[core/dataset/ast/test]
names = ['text','image','video']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/diffusion/wan/image2video/inputs(text, core/process/image/read(image))',
  ]

# process
[microsoft/process/diffusion/wan]
pretrained_name = wan-v2.1-i2v-14b-480p
max_seq_length = 77
video_size = (832, 480)

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/video]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/diffusion]
output_folder = ${core/cli:output_folder}
video_fps = 16

[core/wandb]
token = 94c448839a16affde64d77e5efedfa77f0fd4524
project = unitorch-i2v-lora-480p
team = xucha-microsoft
run_id_path = ${core/cli:cache_dir}/wandb_run_id.txt

# task
[core/task/deepspeed/supervised]
config_path = omnipixel/configs/adamw.bf16.z3.json
model = microsoft/model/diffusers/peft/lora/image2video/wan
dataset = core/dataset/ast
score_fn = core/score/loss
monitor_fns = ['core/score/loss']
output_header = ['text', 'image']
postprocess_fn = core/postprocess/diffusion/video
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16
log_freq = 1
grad_acc_step = 8
epochs = 1000
learning_rate = 0.0001
save_checkpoint = latest
merge_checkpoint = False

train_batch_size = 1
dev_batch_size = 1
test_batch_size = 1