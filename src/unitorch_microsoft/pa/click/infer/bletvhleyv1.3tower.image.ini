[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.pa.click', 'unitorch_microsoft.models.bletchley']
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv

# model
[microsoft/pa/pretrain/bletchley/v1/3tower]
query_config_type = 0.3B
offer_config_type = 0.3B
output_image_embed = True

# dataset
[core/dataset/ast/test]
data_files = ${core/cli:test_file}
names = ['image']
preprocess_functions = [
    'microsoft/process/bletchley/v1/image_classification(core/process/image/read(image))',
  ]

# process
[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

# task
[core/task/supervised]
model = microsoft/pa/pretrain/bletchley/v1/3tower
dataset = core/dataset/ast

output_header = ['image']
postprocess_fn = microsoft/postprocess/classification/embedding/string
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128