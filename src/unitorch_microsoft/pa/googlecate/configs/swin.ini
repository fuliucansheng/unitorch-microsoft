[core/cli]
task_name = core/task/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[core/model/classification/swin]
pretrained_name = swin-base-patch4-window7-224
num_classes = 4559

# dataset
[core/dataset/ast]
names = ['offerid', 'category', 'image', 'title', 'desc']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = ['core/process/swin/image_classification(core/process/image/read(image))', 'core/process/label(category)']

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = ['core/process/swin/image_classification(core/process/image/read(image))', 'core/process/label(category)']

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = ['core/process/swin/image_classification(core/process/image/read(image))']

# process
[core/process/swin]
pretrained_name = swin-base-patch4-window7-224

[core/process/image]
http_url = http://0.0.0.0:11230/?image={0}

[core/process/label]
num_classes = 4559

# optim
[core/optim/adamw]
learning_rate = 0.0001

# scheduler
[core/scheduler/linear_warmup]
num_warmup_rate = 0.001

# task
[core/task/supervised]
model = core/model/classification/swin
optim = core/optim/adamw
scheduler = core/scheduler/linear_warmup
dataset = core/dataset/ast
loss_fn = core/loss/ce
score_fn = core/score/acc
monitor_fns = ['core/score/acc']
output_header = ['offerid', 'category', 'image', 'title', 'desc']
post_process_fn = core/postprocess/classification/score
writer_fn = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

train_batch_size = 128
dev_batch_size = 128
test_batch_size = 128
