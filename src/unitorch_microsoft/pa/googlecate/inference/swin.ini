[core/cli]
task_name = core/task/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv

# model
[core/model/classification/swin]
pretrained_name = swin-base-patch4-window7-224
num_classes = 4559

# dataset
[core/dataset/ast]
names = ['rowid', 'image']

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = ['core/process/swin/image_classification(core/process/image/read(image))']

# process
[core/process/swin]
pretrained_name = swin-base-patch4-window7-224

[core/process/image]
http_url = http://0.0.0.0:11230/?image={0}

[core/process/label]
num_classes = 4559

[core/process/classification]
act_fn = softmax

# task
[core/task/supervised]
model = core/model/classification/swin
dataset = core/dataset/ast
output_header = ['rowid']
postprocess_fn = core/postprocess/classification/score
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128
