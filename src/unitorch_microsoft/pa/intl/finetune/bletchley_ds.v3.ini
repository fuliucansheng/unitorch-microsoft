[core/cli]
task_name = core/task/deepspeed/supervised
depends_libraries = ['unitorch_microsoft.models.bletchley']
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[microsoft/model/matching/bletchley/v3]
config_type = 2.5B
projection_dim = 2048
gradient_checkpointing = True
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/bletchley/v3/pytorch_model.large.bin

# dataset
[core/dataset/ast]
# id, image, text
names = ['query', 'title', 'image', 'label']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    'microsoft/process/bletchley/v3/classification(query, core/process/image/read(image))',
    'core/process/label(label)',
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    'microsoft/process/bletchley/v3/classification(query, core/process/image/read(image))',
    'core/process/label(label)',
  ]

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v3/classification(query, core/process/image/read(image))',
  ]

[core/process/image]
http_url = http://0.0.0.0:11230/?image={0}

# process
[microsoft/process/bletchley/v3]
max_seq_length = 36

[core/process/classification]
act_fn = sigmoid

# task
[core/task/deepspeed/supervised]
config_path = configs/deepspeed/adamw.json
model = microsoft/model/matching/bletchley/v3
learning_rate = 0.00001
dataset = core/dataset/ast
loss_fn = core/loss/bce
score_fn = core/score/auc
monitor_fns = ['core/score/auc']
output_header = ['query', 'title', 'image', 'label']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

train_batch_size = 128
dev_batch_size = 128
test_batch_size = 128
