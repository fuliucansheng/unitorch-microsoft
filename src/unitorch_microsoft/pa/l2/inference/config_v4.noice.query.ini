[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.models.mmdnn']
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv
pretrained_weight_path = ./pytorch_model.bin

# model
[microsoft/model/classification/mmdnn/bletchley/v1/noice]
config_type = 0.3B
num_query_layers = 3
freeze_base_model = True
output_final_text_embed = True
pretrained_weight_path = ${core/cli:pretrained_weight_path}

# dataset
[core/dataset/ast/test]
data_files = ${core/cli:test_file}
names = ['rowid', 'query']
preprocess_functions = [
    'microsoft/process/bletchley/v1/text_classification(query)',
  ]

# process
[microsoft/process/bletchley/v1]
max_seq_length = 36


# task
[core/task/supervised]
model = microsoft/model/classification/mmdnn/bletchley/v1/noice
dataset = core/dataset/ast

output_header = ['rowid', 'query']
postprocess_fn = core/postprocess/classification/embedding/string
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 256
