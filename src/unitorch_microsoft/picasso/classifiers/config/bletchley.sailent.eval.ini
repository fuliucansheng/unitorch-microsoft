[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.models.bletchley']
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv

# model
[microsoft/model/matching/bletchley/v1/v2]
config_type = 0.8B
projection_dim = 1024
gradient_checkpointing = True
labels = ["there is one or more salient objects in the image, A salient object in an image refers to an object or region that stands out and captures attention due to its visual features, such as color, texture, size, or contrast with the background.", "there are no salient objects in the image, A salient object in an image refers to an object or region that stands out and captures attention due to its visual features, such as color, texture, size, or contrast with the background."]
pretrained_weight_path = https://huggingface.co/datasets/fuliucansheng/unitorchblobfuse/resolve/main/models/bletchley/v1/pytorch_model.0.8B.bin
pretrained_lora_weight_path = https://huggingface.co/datasets/fuliucansheng/unitorchblobfuse/resolve/main/models/adsplus/lora/bletchley/pytorch_model.v1.lora4.salient.2501.bin

# dataset
[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v1/image_classification(core/process/image/read(image))',
  ]

# process
[microsoft/process/bletchley/v1]
max_seq_length = 36

[core/process/image]
http_url = None

[core/process/classification]
act_fn = softmax
id2label = {
    0: "HasSalient",
    1: "NoSalient",
}

# task
[core/task/supervised]
model = microsoft/model/matching/bletchley/v1/v2
dataset = core/dataset/ast
output_header = ['image']
postprocess_fn = core/postprocess/classification/score
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128
