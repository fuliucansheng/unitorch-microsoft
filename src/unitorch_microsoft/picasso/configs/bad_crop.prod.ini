[core/cli]
depends_libraries = ['unitorch_microsoft.picasso.bad_crop']
task_name = core/task/supervised
cache_dir = ./cache
test_file = ./test.tsv
ratio = 1.91

# model
[microsoft/picasso/model/bad_crop/siglip]
pretrained_name = siglip2-so400m-patch14-384
max_seq_length = 48
labels = ["bad cropped, cut off, mutilated"]
pretrained_lora_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/adsplus/lora/siglip/pytorch_model.v2.lora4.badcrop.2506.bin

# dataset
[core/dataset/ast/test]
names = ['url', 'algo', 'rois', 'image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    '''
    microsoft/picasso/process/bad_crop/image_classification(
      core/process/image/read(image),
      algo,
      rois,
      ratio=${core/cli:ratio},
    )
    ''',
  ]

# process
[microsoft/picasso/process/bad_crop]
pretrained_name = siglip2-so400m-patch14-384
max_seq_length = 48

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/classification]
act_fn = sigmoid

# task
[core/task/supervised]
model = microsoft/picasso/model/bad_crop/siglip
dataset = core/dataset/ast
output_header = ['url', 'algo', 'rois', 'image']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128
