[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.picasso.basnet']
cache_dir = ./cache
test_file = ./test.tsv

[microsoft/picasso/model/segmentation/basnet]
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/picasso/pytorch_model.basnet.jewelry.2503.bin

# dataset
[core/dataset/ast]
names = ['image']

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
	'microsoft/picasso/process/basnet/segmentation_inputs(core/process/image/read(image))',
  ]

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[microsoft/picasso/process/basnet]
return_mask = True
# task
[core/task/supervised]
model = microsoft/picasso/model/segmentation/basnet
dataset = core/dataset/ast
output_header = ['image']
postprocess_fn = microsoft/picasso/postprocess/basnet/segmentation
writer = core/writer/csv

output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16
postprocess_workers = 8

test_batch_size = 64
