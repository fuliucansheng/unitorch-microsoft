[core/cli]
depends_libraries = ['unitorch_microsoft.models.bletchley']
task_name = core/task/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv

# model
[microsoft/model/matching/bletchley/v1/v2]
config_type = 0.8B
projection_dim = 1024
gradient_checkpointing = False
labels = ["objects on a clean white background with no textures, watermarks, logos, or color boundaries"]
pretrained_weight_path = https://huggingface.co/datasets/fuliucansheng/unitorchblobfuse/resolve/main/models/bletchley/v1/pytorch_model.0.8B.bin
pretrained_lora_weight_path = https://huggingface.co/datasets/fuliucansheng/unitorchblobfuse/resolve/main/models/picasso/pytorch_model.bletchley.background.classification.202504.bin

# dataset
[core/dataset/ast/test]
; names = ['image']
names = ["url1", 'url2', "label", "image", "image1"]
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v1/image_classification(core/process/image/read(image))',
  ]

# process
[microsoft/process/bletchley/v1]
max_seq_length = 36

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/classification]
act_fn = sigmoid

# task
[core/task/supervised]
model = microsoft/model/matching/bletchley/v1/v2
dataset = core/dataset/ast
output_header = ["url1", 'url2', "label", "image", "image1"]
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128
