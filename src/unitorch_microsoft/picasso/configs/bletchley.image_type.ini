[core/cli]
depends_libraries = ['unitorch_microsoft.models.bletchley']
task_name = core/task/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv

# model
[microsoft/model/matching/bletchley/v1/v2]
config_type = 0.8B
projection_dim = 1024
gradient_checkpointing = False
labels = ["poster image, composed of multiple objects, logo, text, etc.", "a real image, not a poster or a logo", "logo image, composed of logo only"]
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/bletchley/v1/pytorch_model.0.8B.bin
pretrained_lora_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/adsplus/lora/bletchley/pytorch_model.v1.lora4.bg_type.2501.bin

# dataset
[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v1/image_classification(core/process/image/read(image))',
  ]

# process
[microsoft/process/bletchley/v1]
max_seq_length = 36

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/classification]
act_fn = softmax
id2label = {
    0: "Poster",
    1: "Real",
    2: "Logo",
  }

# task
[core/task/supervised]
model = microsoft/model/matching/bletchley/v1/v2
dataset = core/dataset/ast
output_header = ['image']
postprocess_fn = core/postprocess/classification/score
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128
