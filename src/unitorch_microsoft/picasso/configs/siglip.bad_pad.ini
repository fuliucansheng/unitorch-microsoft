[core/cli]
depends_libraries = ['unitorch_microsoft.models.siglip']
task_name = core/task/supervised
cache_dir = ./cache
test_file = ./test.tsv

# model
[microsoft/model/matching/siglip/v2]
pretrained_name = siglip2-so400m-patch14-384
max_seq_length = 48
labels = ["obvious boundaries, noisy"]
pretrained_lora_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/adsplus/lora/siglip/pytorch_model.v2.lora4.badpad.2601.bin

# dataset
[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'core/process/siglip/image_classification(core/process/image/read(image))',
  ]

# process
[core/process/siglip]
pretrained_name = siglip2-so400m-patch14-384
max_seq_length = 48

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/classification]
act_fn = sigmoid

# task
[core/task/supervised]
model = microsoft/model/matching/siglip/v2
dataset = core/dataset/ast
output_header = ['image']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128
