[core/cli]
depends_libraries = ['unitorch_microsoft.picasso.diffusion.clip_interrogator']
script_name = microsoft/picasso/script/diffusion/interrogator/clip
data_file = ./data.tsv
output_file = ./output.tsv
names = ['image']
image_col = image
device = cpu

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/pipeline/interrogator/clip]
pretrained_name = clip-vit-large-patch14
device = ${core/cli:device}

[microsoft/picasso/script/diffusion/interrogator/clip]
data_file = ${core/cli:data_file}
output_file = ${core/cli:output_file}
names = ${core/cli:names}
image_col = ${core/cli:image_col}
