[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.models.bletchley']
cache_dir = ./cache
from_ckpt_dir = ${core/cli:cache_dir}
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[microsoft/model/classification/bletchley/v3/image]
config_type = 2.5B
projection_dim = 1024
freeze_base_model = False
num_classes = 19
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/bletchley/v3/pytorch_model.large.bin

# dataset
[core/dataset/ast]
# id, image, text
names = ['image', 'label']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    'microsoft/process/bletchley/v3/image_classification(core/process/image/read(image))',
    'core/process/label(int(label))',
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    'microsoft/process/bletchley/v3/image_classification(core/process/image/read(image))',
    'core/process/label(int(label))',
  ]

[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v3/image_classification(core/process/image/read(image))',
  ]

# process
[microsoft/process/bletchley/v3]
max_seq_length = 36

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/classification]
act_fn = softmax

# optim
[core/optim/adamw]
learning_rate = 0.00001

# scheduler
[core/scheduler/linear_warmup]
num_warmup_rate = 0.001

# task
[core/task/supervised]
model = microsoft/model/classification/bletchley/v3/image
dataset = core/dataset/ast
optim = core/optim/adamw
scheduler = core/scheduler/linear_warmup
loss_fn = core/loss/ce
score_fn = core/score/acc
monitor_fns = ['core/score/acc']
output_header = ['image', 'label']
postprocess_fn = core/postprocess/classification/score
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16
epochs = 20
log_freq = 100
save_checkpoint = best
save_optimizer = False
save_scheduler = False

train_batch_size = 4
dev_batch_size = 4
