
[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.models.bletchley']
test_file = ./test.tsv
output_file = ./output.txt

# model
[microsoft/model/matching/bletchley/v3]
config_type = 2.5B
projection_dim = 1024
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/bletchley/v3/pytorch_model.large.bin
pretrained_lora_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/adsplus/lora/bletchley/pytorch_model.v3.lora4.bg.blurry.2412.bin

# dataset
[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = [
    'microsoft/process/bletchley/v3/classification("led lights around the place, out of focus, disgusting, blurry", core/process/image/read(image))',
  ]

# process
[microsoft/process/bletchley/v3]
max_seq_length = 36

[core/process/image]
http_url = None

[core/process/classification]
act_fn = sigmoid

# task
[core/task/supervised]
model = microsoft/model/matching/bletchley/v3
dataset = core/dataset/ast
output_header = ['image']
postprocess_fn = core/postprocess/classification/binary_score
writer = core/writer/csv

output_path = ${core/cli:output_file}

num_workers = 16

test_batch_size = 128
