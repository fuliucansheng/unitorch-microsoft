[core/cli]
enabled_services = [
    "core/fastapi/stable/text2image",
    "core/fastapi/stable/inpainting",
    "core/fastapi/stable_flux/text2image",
    "core/fastapi/stable_flux/image_control",
    "core/fastapi/stable_flux/image_redux",
    "core/fastapi/stable_flux/inpainting",
  ]
device = cpu

# pipeline
[core/fastapi/pipeline/stable/text2image]
pretrained_name = stable-v1.5-realistic-v5.1
max_seq_length = 77
device = ${core/cli:device}

[core/fastapi/pipeline/stable/inpainting]
pretrained_name = stable-v1.5-inpainting
max_seq_length = 77
device = ${core/cli:device}

[core/fastapi/pipeline/stable_flux/text2image]
pretrained_name = stable-flux-dev
max_seq_length = 77
device = ${core/cli:device}

[core/fastapi/pipeline/stable_flux/image_control]
pretrained_name = stable-flux-dev-canny
max_seq_length = 77
device = ${core/cli:device}

[core/fastapi/pipeline/stable_flux/image_redux]
pretrained_name = stable-flux-dev-redux
max_seq_length = 77
device = ${core/cli:device}

[core/fastapi/pipeline/stable_flux/inpainting]
pretrained_name = stable-flux-dev-fill
max_seq_length = 77
device = ${core/cli:device}
