[core/cli]
depends_libraries = [
    "unitorch_microsoft.picasso.diffusion",
  ]
task_name = core/task/deepspeed/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
output_folder = ./images
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[core/model/diffusers/text2image/controlnet_xl]
pretrained_name = stable-xl-base-vae-fp16
pretrained_controlnet_name = stable-xl-controlnet-tile
scheduler_config_path = configs/diffusion/schedulers/ddpm.json

# dataset
[core/dataset/ast]
names = ['text', 'cond_image', 'image', 'cateid']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    '''
    core/process/diffusion/controlnet_xl/text2image(
      text, 
      core/process/image/read(image), 
      microsoft/picasso/diffusion/process/padding(
        core/process/image/read(cond_image),
        int(cateid),
      ),
    )
    '''
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    '''
    core/process/diffusion/controlnet_xl/text2image(
      text, 
      core/process/image/read(image), 
      microsoft/picasso/diffusion/process/padding(
        core/process/image/read(cond_image),
        int(cateid),
      ),
    )
    '''
  ]

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
preprocess_functions = [
    '''
    core/process/diffusion/controlnet_xl/text2image/inputs(
      text,
      microsoft/picasso/diffusion/process/padding(
        core/process/image/read(cond_image),
        int(cateid),
      ),
    )
    ''',
  ]

# process
[core/process/diffusion/controlnet_xl]
pretrained_name = stable-xl-base-vae-fp16
max_seq_length = 77
image_size = (832, 384)

[microsoft/picasso/diffusion/process]
image_size = (832, 384)

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/diffusion]
output_folder = ${core/cli:output_folder}

# task
[core/task/deepspeed/supervised]
config_path = configs/deepspeed/adamw.json
model = core/model/diffusers/text2image/controlnet_xl
dataset = core/dataset/ast
score_fn = core/score/loss
monitor_fns = ['core/score/loss']
output_header = ['text', 'cond_image', 'image', 'cateid']
postprocess_fn = core/postprocess/diffusion/image
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16
learning_rate = 0.00003

train_batch_size = 1
dev_batch_size = 1
test_batch_size = 2
