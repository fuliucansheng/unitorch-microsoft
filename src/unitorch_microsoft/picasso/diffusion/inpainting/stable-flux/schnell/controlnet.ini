[core/cli]
task_name = core/task/deepspeed/supervised
depends_libraries = ['unitorch_microsoft.models.diffusers']
from_ckpt_dir = ./cache
cache_dir = ./cache
output_folder = ./images
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[core/model/diffusers/text2image/controlnet_flux]
pretrained_name = stable-flux-schnell
pretrained_controlnet_name = stable-flux-controlnet-dev-union
config_path = picasso/diffusion/text2image/stable-flux/schnell/transformer.json
controlnet_configs_path = picasso/diffusion/inpainting/stable-flux/schnell/controlnet.json
controlnet_conditioning_mode = None


# dataset
[core/dataset/ast]
names = ['text', 'image', 'mask']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = [
    '''
    core/process/diffusion/stable_flux/text2image(
      text, 
      core/process/image/read(image),
    ),
    ''',
    '''
    core/process/diffusion/controlnet_flux/inpainting/control_inputs(
      core/process/image/read(image), 
      core/process/image/read(mask),
    )
    '''
  ]

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = [
    '''
    core/process/diffusion/stable_flux/text2image(
      text, 
      core/process/image/read(image),
    ),
    ''',
    '''
    core/process/diffusion/controlnet_flux/inpainting/control_inputs(
      core/process/image/read(image), 
      core/process/image/read(mask),
    )
    '''
  ]

[core/dataset/ast/test]
names = ['text', 'image', 'mask']
data_files = ${core/cli:test_file}
preprocess_functions = [
    "core/process/diffusion/stable_flux/text2image/inputs(text)",
    '''
    core/process/diffusion/controlnet_flux/inpainting/control_inputs(
      core/process/image/read(image), 
      core/process/image/read(mask),
    )
    '''
  ]

# process
[core/process/diffusion/stable_flux]
pretrained_name = stable-flux-schnell
max_seq_length = 77
image_size = (1024, 1024)

[core/process/diffusion/controlnet_flux]
pretrained_name = stable-flux-schnell
max_seq_length = 77
image_size = (1024, 1024)

[core/process/image]
http_url = http://0.0.0.0:11230/?file={0}

[core/process/diffusion]
output_folder = ${core/cli:output_folder}

# task
[core/task/deepspeed/supervised]
config_path = configs/deepspeed/adamw.bf16.json
model = core/model/diffusers/text2image/controlnet_flux
dataset = core/dataset/ast
score_fn = core/score/loss
monitor_fns = ['core/score/loss']
output_header = ['text', 'image', 'mask']
postprocess_fn = core/postprocess/diffusion/image
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16
log_freq = 100
zero_stage = 3

train_batch_size = 1
dev_batch_size = 1
test_batch_size = 1
