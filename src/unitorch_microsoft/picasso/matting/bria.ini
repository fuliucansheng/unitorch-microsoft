[core/cli]
task_name = core/task/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
output_folder = ./images
train_file = ./train.tsv
dev_file = ./dev.tsv
test_file = ./test.tsv

# model
[core/model/segmentation/bria]
pretrained_weight_path = https://huggingface.co/briaai/RMBG-1.4/resolve/main/pytorch_model.bin

# dataset
[core/dataset/ast]
names = ['rowid', 'image', 'mask']

[core/dataset/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = ['core/process/bria/segmentation(core/process/image/read(image), core/process/image/read(mask))']

[core/dataset/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = ['core/process/bria/segmentation(core/process/image/read(image), core/process/image/read(mask))']

[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = ['core/process/bria/segmentation/inputs(core/process/image/read(image))']

# process
[core/process/bria]
image_size = 1024

[core/process/segmentation]
output_folder = ${core/cli:output_folder}

[core/process/image]
http_url = http://0.0.0.0:11230/?image={0}

# task
[core/task/supervised]
model = core/model/segmentation/bria
optim = core/optim/adamw
scheduler = core/scheduler/linear_warmup
dataset = core/dataset/ast
loss_fn = core/loss/mse
score_fn = core/score/mse
monitor_fns = ['core/score/mse']

output_header = ['image']
postprocess_fn = core/postprocess/segmentation/image
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

train_batch_size = 2
dev_batch_size = 2
test_batch_size = 2