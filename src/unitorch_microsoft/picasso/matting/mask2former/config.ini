[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.models.mask2former']
from_ckpt_dir = ./cache
cache_dir = ./cache
output_folder = ./images
test_file = ./test.tsv

# model
[microsoft/model/segmentation/mask2former]
pretrained_name = mask2former-swin-base-ade-semantic
config_path = picasso/matting/mask2former/config.json
pretrained_weight_path = https://unitorchazureblob.blob.core.windows.net/shares/models/picasso/pytorch_model.mask2former.bin

# dataset
[core/dataset/ast/test]
names = ['image']
data_files = ${core/cli:test_file}
preprocess_functions = ['core/process/mask2former/image_segmentation(core/process/image/read(image))']

# process
[core/process/mask2former]
pretrained_name = mask2former-swin-base-ade-semantic
vision_config_path = picasso/matting/mask2former/preprocessor_config.json

[core/process/segmentation]
output_folder = ${core/cli:output_folder}

[core/process/image]
http_url = http://0.0.0.0:11230/?image={0}

# postprocess
[microsoft/process/mask2former]
pretrained_name = mask2former-swin-base-ade-semantic
vision_config_path = picasso/matting/mask2former/preprocessor_config.json
mask_threshold = 0.8

# task
[core/task/supervised]
model = microsoft/model/segmentation/mask2former
dataset = core/dataset/ast
output_header = ['image']
postprocess_fn = core/postprocess/segmentation/mask
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir = ${core/cli:cache_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 64