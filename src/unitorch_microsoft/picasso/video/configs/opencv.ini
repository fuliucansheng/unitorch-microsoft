[core/cli]
depends_libraries = ['unitorch_microsoft.picasso.video.opencv']
script_name = microsoft/picasso/script/video/opencv/zoom_in
data_file = ./data.tsv
output_folder = ./output

[microsoft/picasso/script/video/opencv/zoom_in]
data_file = ${core/cli:data_file}
http_url = http://0.0.0.0:11230/?file={0}
names = ["rowid", "image", "bboxes"]
index_col = rowid
image_col = image
bboxes_col = bboxes
num_frames = 150
output_folder = ${core/cli:output_folder}
