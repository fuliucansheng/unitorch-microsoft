[core/cli]
depends_libraries = ['unitorch_microsoft.picasso.video.opencv']
script_name = microsoft/picasso/script/video/opencv
data_file = ./data.tsv
output_folder = ./output

[microsoft/picasso/script/video/opencv]
data_file = ${core/cli:data_file}
names = ["image", "bboxes"]
image_col = image
bboxes_col = bboxes
num_frames = 60
output_folder = ${core/cli:output_folder}
