[core/cli]
depends_libraries = [
    "unitorch_microsoft.webuis.labeling",
  ]
enabled_webuis = [
    "microsoft/webui/labeling/classification",
  ]
data_file = ./datafile.tsv
result_file = ./result.tsv
http_url = None
names = ["video"]
text_cols = []
image_cols = []
video_cols = ["video"]

[microsoft/webui/labeling/classification]
guideline = """
  Your task is to label the quality of generated video. The quality could be evaluated from 5 different perspectives:
  1. Consistency: character consistency between shots and scenes including facial, clothes, body etc. There’s no abnormal additional or disappeared objects between scenes.
  2. Realism: adherence to reality and physical: It covers realism of scenes and characters. The logical coherence of video content is normal in physical world.
  3. Fluidity: Motion should be natural. There’s no flicking, distortion phenomenon in the video.
  4. Relevance: text prompt and video content should well match. Product and brand should be exactly the same as described in the text and video. 
  5. Aesthetics: It covers visual appeal and attractiveness. The video should have harmonious color schemes and no accessibility issues for captions.
  
  Video with any issues from the 5 perspectives should be labelled as bad. 
  """
data_file = ${core/cli:data_file}
result_file = ${core/cli:result_file}
http_url = ${core/cli:http_url}
names = ${core/cli:names}
text_cols = ${core/cli:text_cols}
image_cols = ${core/cli:image_cols}
video_cols = ${core/cli:video_cols}
choices = ["good", "fair", "bad"]
