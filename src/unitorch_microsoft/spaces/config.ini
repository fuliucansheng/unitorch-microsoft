[core/cli]
fastapi_endpoint1 = None
fastapi_endpoint2 = None
fastapi_endpoint3 = None
fastapi_endpoint4 = None
fastapi_endpoint5 = None
environ = {}
recraft_token = your recraft api token
ideogram_token = your ideogram api token
bria_token = your bria api token
flux_token = your flux api token
device = cpu

[microsoft/spaces/picasso/expand_bg]
flux_endpoint = ${core/cli:fastapi_endpoint1}/core/fastapi/stable_flux/inpainting

[microsoft/spaces/betas/expand_bg]
flux_endpoint = ${core/cli:fastapi_endpoint1}/core/fastapi/stable_flux/inpainting

[core/fastapi/pipeline/stable/text2image]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/fastapi/pipeline/stable_flux/text2image]
enable_cpu_offload = True
device = ${core/cli:device}

[core/fastapi/pipeline/stable_flux/inpainting]
enable_cpu_offload = True
device = ${core/cli:device}

[core/pipeline/bria]
device = ${core/cli:device}

[core/pipeline/llava/mistral_clip]
device = ${core/cli:device}

[core/pipeline/llava/llama_siglip]
device = ${core/cli:device}

[microsoft/models/bletchley/pipeline/v1/matching/v2]
device = ${core/cli:device}

[microsoft/models/bletchley/pipeline/v3/matching/v2]
device = ${core/cli:device}

[microsoft/picasso/pipeline/basnet]
device = ${core/cli:device}

[microsoft/models/siglip/pipeline/matching/v2]
device = ${core/cli:device}