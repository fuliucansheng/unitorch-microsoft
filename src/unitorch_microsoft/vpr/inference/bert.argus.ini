[core/cli]
task_name = core/task/supervised
depends_libraries = ['unitorch_microsoft.vpr']
from_ckpt_dir = ./cache
cache_dir = ./cache
test_file = ./test.tsv
pretrained_weight_path = ./pytorch_model.bin

# model
[microsoft/vpr/pretrain/bert]
pretrained_name = bert-base-uncased
config_path = vpr/configs/bert.argus.json
num_hidden_layers = 3
image_embed_dim = 100
use_clip_loss = False
pretrained_weight_path = ${core/cli:pretrained_weight_path}
output_query_embed = True

[core/dataset/ast/test]
data_files = ${core/cli:test_file}
names = ['id', 'image', 'text', 'label']
preprocess_functions = [
    'core/process/bert/classification(text)',
    'core/process/features(image, pad=0, num=100, dtype="float", key="image_embeds")'
  ]

# process
[core/process/bert]
pretrained_name = bert-base-uncased
max_seq_length = 48

# task
[core/task/supervised]
model = microsoft/vpr/pretrain/bert
dataset = core/dataset/ast

output_header = ['id', 'image', 'text', 'label']
postprocess_fn = core/postprocess/classification/embedding
writer = core/writer/csv

from_ckpt_dir = ${core/cli:from_ckpt_dir}
output_path = ${core/cli:cache_dir}/output.txt

num_workers = 16

test_batch_size = 128
