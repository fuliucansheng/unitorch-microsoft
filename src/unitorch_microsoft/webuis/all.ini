[microsoft/models/bletchley/pipeline/v1/matching]
max_seq_length = 36
device = ${core/cli:device}

[microsoft/models/bletchley/pipeline/v3/matching]
max_seq_length = 36
device = ${core/cli:device}

[microsoft/models/bletchley/pipeline/v1/matching/v2]
device = ${core/cli:device}

[microsoft/models/bletchley/pipeline/v3/matching/v2]
device = ${core/cli:device}

[microsoft/pipeline/selection/image/tagger]
device = ${core/cli:device}

[microsoft/pipeline/selection/image/getty]
names = ["gettyid", "title", "desc", "url", "width", "height", "emb"]
emb_col = emb
show_cols = ["gettyid", "title", "desc", "url"]
image_cols = ["url"]
device = ${core/cli:device}

[microsoft/webui/chatgpt]
api_endpoint = ${core/cli:api_endpoint}
api_key = ${core/cli:api_key}
api_deploy_name = ${core/cli:api_deploy_name}
