[core/cli]
depends_libraries = [
    "unitorch_microsoft.models.diffusers",
  ]
enabled_webuis = [
    "microsoft/webui/llm",
    "microsoft/webui/diffusion",
    "microsoft/webui/classification",
    "microsoft/webui/selection",
    "microsoft/webui/detection",
    "microsoft/webui/segmentation",
    "microsoft/webui/picasso",
    ; "microsoft/webui/chatgpt",
    "microsoft/webui/tools",
  ]
device = 0
api_endpoint = xxxx
api_key = xxxx
api_deploy_name = xxxx

# pipeline
[core/pipeline/bloom]
max_seq_length = 256
max_gen_seq_length = 128
device = ${core/cli:device}

[core/pipeline/llama]
quant_config_path = configs/quantization/8bit.json
device = ${core/cli:device}

[core/pipeline/mistral]
quant_config_path = configs/quantization/4bit.json
max_seq_length = 512
max_gen_seq_length = 128
device = ${core/cli:device}

[core/pipeline/llava/mistral_clip]
quant_config_path = configs/quantization/8bit.json
max_seq_length = 512
max_gen_seq_length = 128
device = ${core/cli:device}

[core/pipeline/detr]
device = ${core/cli:device}

[core/pipeline/sam]
device = ${core/cli:device}

[microsoft/pipeline/mask2former]
device = ${core/cli:device}

[core/pipeline/bria]
pretrained_weight_path = https://huggingface.co/briaai/RMBG-1.4/resolve/main/pytorch_model.bin
device = ${core/cli:device}

[core/pipeline/stable/text2image]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable/image2image]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable/inpainting]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable/resolution]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable/image2video]
enable_cpu_offload = True
enable_xformers = False
device = ${core/cli:device}

[core/pipeline/interrogator/clip]
device = ${core/cli:device}

[core/pipeline/stable_xl/text2image]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable_xl/image2image]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable_xl/inpainting]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = True
device = ${core/cli:device}

[core/pipeline/stable_3/text2image]
max_seq_length = 77
max_seq_length2 = 256
enable_cpu_offload = True
enable_xformers = False
device = ${core/cli:device}

[core/pipeline/stable_3/image2image]
max_seq_length = 77
max_seq_length2 = 256
enable_cpu_offload = True
enable_xformers = False
device = ${core/cli:device}

[core/pipeline/stable_3/inpainting]
max_seq_length = 77
max_seq_length2 = 256
enable_cpu_offload = True
enable_xformers = False
device = ${core/cli:device}

[core/pipeline/stable_flux/text2image]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = False
device = ${core/cli:device}

[core/pipeline/stable_flux/image2image]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = False
device = ${core/cli:device}

[core/pipeline/stable_flux/inpainting]
max_seq_length = 77
enable_cpu_offload = True
enable_xformers = False
